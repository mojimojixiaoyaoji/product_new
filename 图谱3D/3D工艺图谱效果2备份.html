<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>水泥工艺知识图谱 3D 可视化</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/renderers/CSS2DRenderer.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:radial-gradient(ellipse at center,#0a1628 0%,#050a14 40%,#020408 100%);color:#e6edf3;overflow:hidden}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(100,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(100,200,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 80%,rgba(100,200,255,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(0,212,255,0.06) 0%,transparent 40%),radial-gradient(circle at 50% 50%,rgba(110,180,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
#container{width:100vw;height:100vh}
#info{position:fixed;bottom:24px;left:20px;background:rgba(5,10,30,0.9);padding:16px 20px;border-radius:12px;border:1px solid rgba(100,200,255,0.3);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,0.8)}
#info div{margin:6px 0;font-size:13px;color:#a0c0e0}
#info span{color:#6eb5ff;font-weight:600}
#detail{position:fixed;right:20px;top:20px;width:340px;background:rgba(5,10,30,0.95);padding:20px;border-radius:14px;display:none;backdrop-filter:blur(12px);border:1px solid rgba(100,200,255,0.3);box-shadow:0 8px 32px rgba(0,0,0,0.8);z-index:1000;animation:slideIn 0.3s ease;max-height:calc(100vh - 40px);overflow-y:auto}
#detail h3{color:#6eb5ff;margin-bottom:12px;font-size:18px;text-shadow:0 0 20px rgba(110,180,255,0.8)}
#detail p{font-size:14px;line-height:1.8;color:#b0c8e8}
.label{color:#fff;font-size:11px;padding:4px 10px;background:rgba(5,10,30,0.9);border-radius:6px;white-space:nowrap;border:1px solid rgba(100,200,255,0.4);text-shadow:0 0 10px rgba(110,180,255,0.8);pointer-events:none}
.label-renderer,.label-renderer *{background:transparent!important;background-color:transparent!important}
.label-renderer > div{background:transparent!important;background-color:transparent!important}
.label-renderer div:not(.label){background:transparent!important;background-color:transparent!important}
.title{position:fixed;top:24px;left:50%;transform:translateX(-50%);font-size:28px;font-weight:bold;background:linear-gradient(135deg,#6eb5ff,#00d4ff,#ff6b9d);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;letter-spacing:2px}
.tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:13px;color:#6080a0;background:rgba(5,10,30,0.8);padding:10px 20px;border-radius:20px;border:1px solid rgba(100,200,255,0.2)}
.legend{position:fixed;bottom:24px;right:20px;background:rgba(5,10,30,0.9);padding:14px 18px;border-radius:10px;border:1px solid rgba(100,200,255,0.3)}
.legend-item{display:flex;align-items:center;margin:6px 0;font-size:12px;color:#a0c0e0}
.legend-dot{width:12px;height:12px;border-radius:50%;margin-right:10px;box-shadow:0 0 10px currentColor}

.control-panel{position:fixed;top:220px;right:20px;background:rgba(5,10,30,0.95);padding:10px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:100;transition:all 0.3s ease}

.control-panel:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

.control-buttons{display:flex;flex-direction:column;gap:6px}

.control-btn{width:42px;height:42px;border:none;border-radius:10px;background:linear-gradient(135deg,rgba(100,200,255,0.15),rgba(100,200,255,0.05));color:#6eb5ff;font-size:16px;cursor:pointer;transition:all 0.25s ease;display:flex;align-items:center;justify-content:center;border:1px solid rgba(100,200,255,0.2)}

.control-btn:hover{background:linear-gradient(135deg,rgba(100,200,255,0.3),rgba(100,200,255,0.15));transform:translateY(-2px);box-shadow:0 4px 15px rgba(110,180,255,0.4);border-color:rgba(100,200,255,0.4);color:#fff}

.control-btn:active{transform:translateY(0) scale(0.95)}

.control-btn i{font-size:14px}

.filter-panel{position:fixed;top:60px;left:20px;background:rgba(5,10,30,0.95);padding:16px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:100;width:280px;max-height:calc(100vh - 80px);overflow-y:auto;transition:all 0.3s ease}

.filter-panel:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

.filter-panel::-webkit-scrollbar{width:4px}

.filter-panel::-webkit-scrollbar-track{background:transparent}

.filter-panel::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

.filter-panel h4{color:#6eb5ff;font-size:15px;margin-bottom:16px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}

.filter-panel h4::before{content:'\f0b0';font-family:'Font Awesome 6 Free';font-weight:900;font-size:13px}

.filter-panel h4 .toggle-icon{margin-left:auto;transition:transform 0.3s ease;font-size:12px}

.filter-panel.collapsed h4 .toggle-icon{transform:rotate(-90deg)}

.filter-panel.collapsed .filter-content{display:none}

.filter-group{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(100,200,255,0.1)}

.filter-group:last-of-type{border-bottom:none;margin-bottom:0}

.filter-group-title{font-size:11px;color:#7a9abf;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}

.filter-group-title i{font-size:10px}

.filter-row{display:flex;align-items:center;margin-bottom:12px;gap:10px}

.filter-row label{color:#a0c0e0;font-size:12px;width:50px;flex-shrink:0;font-weight:500}

.filter-row select,.filter-row input{flex:1;padding:8px 12px;border:1px solid rgba(100,200,255,0.2);border-radius:8px;background:rgba(10,20,40,0.7);color:#e6edf3;font-size:12px;transition:all 0.25s ease}

.filter-row select:focus,.filter-row input:focus{outline:none;border-color:#6eb5ff;box-shadow:0 0 12px rgba(110,180,255,0.25);background:rgba(15,30,60,0.8)}

.filter-row select:hover,.filter-row input:hover{border-color:rgba(100,200,255,0.35)}

.filter-row select option{background:rgba(5,10,30,0.95);color:#e6edf3;padding:8px}

.filter-btn{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid rgba(100,200,255,0.3);color:#6eb5ff;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s ease;display:flex;align-items:center;gap:6px}

.filter-btn:hover{background:rgba(100,200,255,0.1);border-color:rgba(100,200,255,0.5);transform:translateY(-1px)}

.filter-btn:active{transform:translateY(0)}

.filter-btn i{font-size:11px}

.filter-row:last-child{justify-content:flex-start;gap:10px;margin-top:16px;padding-top:12px;border-top:1px solid rgba(100,200,255,0.15);flex-shrink:0;padding-left:50px}

@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#info{position:fixed;bottom:24px;left:20px;background:rgba(5,10,30,0.95);padding:16px 20px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:fadeIn 0.5s ease;transition:all 0.3s ease}

#info:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

#info div{margin:8px 0;font-size:13px;color:#a0c0e0;display:flex;align-items:center;gap:8px}

#info span{display:inline-block;width:10px;height:10px;border-radius:50%;box-shadow:0 0 8px currentColor}

.legend{position:fixed;bottom:24px;right:20px;background:rgba(5,10,30,0.95);padding:16px 20px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:fadeIn 0.5s ease;transition:all 0.3s ease;max-height:calc(100vh - 120px);overflow-y:auto}

.legend:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

.legend::-webkit-scrollbar{width:4px}

.legend::-webkit-scrollbar-track{background:transparent}

.legend::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

.tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:13px;color:#6080a0;background:rgba(5,10,30,0.9);padding:12px 24px;border-radius:24px;border:1px solid rgba(100,200,255,0.2);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:fadeIn 0.5s ease;transition:all 0.3s ease}

.tip:hover{border-color:rgba(100,200,255,0.35);color:#7a9abf}

.title{position:fixed;top:24px;left:50%;transform:translateX(-50%);font-size:28px;font-weight:bold;background:linear-gradient(135deg,#6eb5ff,#00d4ff,#ff6b9d);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;letter-spacing:2px;animation:fadeIn 0.5s ease;z-index:100}

#detail::-webkit-scrollbar{width:4px}

#detail::-webkit-scrollbar-track{background:transparent}

#detail::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

#detail h3{color:#6eb5ff;margin-bottom:12px;font-size:18px;text-shadow:0 0 20px rgba(110,180,255,0.8);display:flex;align-items:center;gap:10px}

#detail h3::before{content:'\f05a';font-family:'Font Awesome 6 Free';font-weight:900;font-size:16px;color:#6eb5ff}

#detail p{font-size:14px;line-height:1.8;color:#b0c8e8;text-align:justify}

.detail-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.2);color:#6eb5ff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;font-size:12px}

.detail-close:hover{background:rgba(100,200,255,0.2);border-color:rgba(100,200,255,0.4);transform:scale(1.05)}

.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease}

.loading-overlay.hidden{opacity:0;pointer-events:none}

.loading-spinner{width:50px;height:50px;border:3px solid rgba(100,200,255,0.2);border-top-color:#6eb5ff;border-radius:50%;animation:spin 1s linear infinite}

.loading-text{margin-top:20px;color:#6eb5ff;font-size:14px;letter-spacing:2px}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载图谱...</div>
</div>
<div id="container"></div>
<div class="title">水泥工艺知识图谱 · 3D可视化</div>
<div id="info">
    <div><span style="background:#6eb5ff;color:#6eb5ff"></span>核心节点：工艺总览</div>
    <div><span style="background:#00d4ff;color:#00d4ff"></span>青色节点：工艺环节</div>
    <div><span style="background:#ff6b9d;color:#ff6b9d"></span>粉色节点：关键设备</div>
    <div><span style="background:#a855f7;color:#a855f7"></span>蓝色节点：原料材料</div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(100,200,255,0.15);font-size:12px;color:#7a9abf"><i class="fas fa-mouse" style="margin-right:6px"></i>拖拽旋转 · 滚轮缩放 · 悬停查看详情</div>
</div>
<div id="detail">
    <button class="detail-close" onclick="closeDetail()" title="关闭"><i class="fas fa-times"></i></button>
    <h3 id="nodeName"></h3>
    <p id="nodeDesc"></p>
</div>
<div class="filter-panel" id="filterPanel">
    <h4 onclick="toggleFilterPanel()">筛选条件<i class="fas fa-chevron-down toggle-icon"></i></h4>
    <div class="filter-content">
        <div class="filter-group">
            <div class="filter-group-title"><i class="fas fa-cube"></i>实体筛选</div>
            <div class="filter-row">
                <label>类型：</label>
                <select id="filter-entity-type">
                    <option value="all">全部</option>
                    <option value="core">核心工艺</option>
                    <option value="process">工艺流程</option>
                    <option value="device">设备</option>
                    <option value="material">原料/物料</option>
                </select>
            </div>
            <div class="filter-row">
                <label>名称：</label>
                <input type="text" id="filter-entity-name" placeholder="输入实体名称">
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title"><i class="fas fa-link"></i>关系筛选</div>
            <div class="filter-row">
                <label>类型：</label>
                <select id="filter-relation-type">
                    <option value="all">全部</option>
                    <option value="include">包含</option>
                    <option value="flow_to">流向</option>
                    <option value="use">使用</option>
                    <option value="equip_for">设备支撑</option>
                    <option value="produce">生产</option>
                </select>
            </div>
            <div class="filter-row">
                <label>名称：</label>
                <input type="text" id="filter-relation-name" placeholder="输入关系名称">
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title"><i class="fas fa-tag"></i>属性筛选</div>
            <div class="filter-row">
                <label>名称：</label>
                <input type="text" id="filter-attr-name" placeholder="输入属性名称">
            </div>
            <div class="filter-row">
                <label>数值：</label>
                <input type="text" id="filter-attr-value" placeholder="输入属性值">
            </div>
        </div>
        <div class="filter-row">
            <button class="filter-btn" id="btn-filter"><i class="fas fa-search"></i>筛选</button>
            <button class="filter-btn" id="btn-clear"><i class="fas fa-undo"></i>重置</button>
        </div>
    </div>
</div>
<div class="control-panel">
    <div class="control-buttons">
        <button class="control-btn" title="放大" id="btn-zoom-in"><i class="fas fa-plus"></i></button>
        <button class="control-btn" title="缩小" id="btn-zoom-out"><i class="fas fa-minus"></i></button>
        <button class="control-btn" title="下载" id="btn-download"><i class="fas fa-download"></i></button>
        <button class="control-btn" title="分享" id="btn-share"><i class="fas fa-share-alt"></i></button>
        <button class="control-btn" title="恢复初始状态" id="btn-reset"><i class="fas fa-sync-alt"></i></button>
    </div>
</div>
<div class="tip">水泥生产工艺：两磨一烧 · 全过程智能知识图谱</div>
<div class="legend">
    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(100,200,255,0.15)">
        <div style="font-size:12px;color:#6eb5ff;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-cube" style="font-size:10px"></i>实体类型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6eb5ff;color:#6eb5ff"></div>核心工艺</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;color:#00d4ff"></div>工艺环节</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b9d;color:#ff6b9d"></div>关键设备</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7;color:#a855f7"></div>原料材料</div>
    </div>
    <div>
        <div style="font-size:12px;color:#6eb5ff;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-link" style="font-size:10px"></i>关系类型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6eb5ff;color:#6eb5ff"></div>包含</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;color:#00d4ff"></div>流向</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f72585;color:#f72585"></div>使用</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7;color:#a855f7"></div>设备支撑</div>
        <div class="legend-item"><div class="legend-dot" style="background:#72efdd;color:#72efdd"></div>生产</div>
    </div>
</div>

<script>
const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000)
camera.position.set(0, 5, 35)

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.setClearColor(0x000000, 0)
document.getElementById("container").appendChild(renderer.domElement)

const labelRenderer = new THREE.CSS2DRenderer()
labelRenderer.setSize(window.innerWidth, window.innerHeight)
labelRenderer.domElement.style.position = "fixed"
labelRenderer.domElement.style.top = "0"
labelRenderer.domElement.style.left = "0"
labelRenderer.domElement.style.pointerEvents = "none"
labelRenderer.domElement.style.background = "transparent"
labelRenderer.domElement.style.backgroundColor = "transparent"
labelRenderer.domElement.classList.add('label-renderer')
document.body.appendChild(labelRenderer.domElement)

const style = document.createElement('style')
style.textContent = `
  .css2d-container, .css2d-container * {
    background: transparent !important;
    background-color: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }
  .css2d-container > div {
    background: transparent !important;
    background-color: transparent !important;
  }
`
document.head.appendChild(style)

setTimeout(() => {
  const allDivs = document.querySelectorAll('body > div')
  allDivs.forEach(div => {
    if (div.id !== 'container' && !div.classList.contains('title') && 
        !div.id.includes('info') && !div.id.includes('detail') && 
        !div.classList.contains('tip') && !div.classList.contains('legend')) {
      div.style.background = 'transparent'
      div.style.backgroundColor = 'transparent'
      const children = div.querySelectorAll('*')
      children.forEach(c => {
        if (!c.classList.contains('label')) {
          c.style.background = 'transparent'
          c.style.backgroundColor = 'transparent'
        }
      })
    }
  })
}, 100)

const controls = new THREE.OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.05
controls.minDistance = 15
controls.maxDistance = 80
controls.autoRotate = true
controls.autoRotateSpeed = 0.3

const ambientLight = new THREE.AmbientLight(0x202040, 0.3)
scene.add(ambientLight)

const pointLight1 = new THREE.PointLight(0x6eb5ff, 2, 150)
pointLight1.position.set(20, 20, 20)
scene.add(pointLight1)

const pointLight2 = new THREE.PointLight(0xff6b9d, 1.5, 150)
pointLight2.position.set(-20, -10, 20)
scene.add(pointLight2)

const pointLight3 = new THREE.PointLight(0x00d4ff, 1, 120)
pointLight3.position.set(0, -20, -20)
scene.add(pointLight3)

const group = new THREE.Group()
scene.add(group)

const colors = {
    core: 0x6eb5ff,
    process: 0x00d4ff,
    device: 0xff6b9d,
    material: 0xa855f7,
    line: 0x6eb5ff
}

const nodes = [
    { name: "水泥生产总工艺", type: "core", desc: "水泥生产核心流程：两磨一烧，包括生料制备、熟料煅烧、水泥粉磨三大阶段", x: 0, y: 0, z: 0 },
    { name: "原料破碎", type: "process", desc: "对石灰石、黏土、砂岩、铁矿石等原料进行破碎至合适粒度", x: -10, y: 7, z: -3 },
    { name: "原料预均化", type: "process", desc: "通过平铺取料降低成分波动，保证原料成分稳定", x: -14, y: 3, z: -6 },
    { name: "生料粉磨", type: "process", desc: "将配比后原料研磨至符合要求的生料粉末", x: -16, y: -3, z: -2 },
    { name: "生料均化", type: "process", desc: "使生料成分均匀稳定，为煅烧提供基础", x: -12, y: -8, z: 3 },
    { name: "预热分解", type: "process", desc: "五级旋风预热+分解炉，完成碳酸盐分解", x: 0, y: -8, z: 2 },
    { name: "回转窑煅烧", type: "process", desc: "1450℃左右高温煅烧生成水泥熟料", x: 6, y: -4, z: 0 },

const flowParticles = []

relations.forEach((rel, idx) => {
    const start = new THREE.Vector3(nodes[rel.from].x, nodes[rel.from].y, nodes[rel.from].z)
    const end = new THREE.Vector3(nodes[rel.to].x, nodes[rel.to].y, nodes[rel.to].z)
    const relType = relationTypes[rel.type]
    
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5)
    const distance = start.distanceTo(end)
    mid.y += distance * 0.1
    
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end)
    const points = curve.getPoints(50)
    const geo = new THREE.BufferGeometry().setFromPoints(points)
    
    const mat = new THREE.LineBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 0.4,
        linewidth: 1
    })
    const line = new THREE.Line(geo, mat)
    line.userData = { relationType: rel.type, relationIndex: idx }
    group.add(line)

    const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.03, 8, false)
    const tubeMat = new THREE.MeshBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 0.2,
        blending: THREE.AdditiveBlending
    })
    const tube = new THREE.Mesh(tubeGeo, tubeMat)
    tube.userData = { relationType: rel.type, relationIndex: idx }
    group.add(tube)
    
    const midPoint = curve.getPoint(0.5)
    const labelDiv = document.createElement("div")
    labelDiv.className = "relation-label"
    labelDiv.textContent = relType.name
    labelDiv.style.cssText = `
        color: #${relType.color.toString(16).padStart(6, '0')};
        font-size: 10px;
        padding: 2px 6px;
        background: rgba(0,0,0,0.6);
        border-radius: 4px;
        border: 1px solid rgba(${(relType.color >> 16) & 255},${(relType.color >> 8) & 255},${relType.color & 255},0.5);
        white-space: nowrap;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(${(relType.color >> 16) & 255},${(relType.color >> 8) & 255},${relType.color & 255},0.8);
    `
    const relLabel = new THREE.CSS2DObject(labelDiv)
    relLabel.position.set(midPoint.x, midPoint.y, midPoint.z)
    group.add(relLabel)
    
    const flowGeo = new THREE.SphereGeometry(0.15, 16, 16)
    const flowMat = new THREE.MeshBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
    })
    const flowParticle = new THREE.Mesh(flowGeo, flowMat)
    flowParticle.userData = { 
        curve: curve, 
        progress: Math.random(), 
        speed: 0.005 + Math.random() * 0.003,
        relationType: rel.type,
        relationIndex: idx
    }
    group.add(flowParticle)
    flowParticles.push(flowParticle)
})



const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()
const detail = document.getElementById("detail")
const nodeName = document.getElementById("nodeName")
const nodeDesc = document.getElementById("nodeDesc")
let hoveredMesh = null
let selectedMesh = null
let isDragging = false
let dragPlane = new THREE.Plane()
let dragOffset = new THREE.Vector3()

window.addEventListener("mousemove", e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1
    
    if (isDragging && selectedMesh) {
        raycaster.setFromCamera(mouse, camera)
        const targetPoint = new THREE.Vector3()
        raycaster.ray.intersectPlane(dragPlane, targetPoint)
        if (targetPoint) {
            selectedMesh.position.copy(targetPoint.sub(dragOffset))
            updateNodePosition(selectedMesh.userData.index, selectedMesh.position)
        }
    }
})

function updateNodePosition(nodeIndex, newPosition) {
    nodes[nodeIndex].x = newPosition.x
    nodes[nodeIndex].y = newPosition.y
    nodes[nodeIndex].z = newPosition.z
    
    labelObjs[nodeIndex].position.set(newPosition.x, newPosition.y + (selectedMesh.geometry.parameters.radius || 0.85) + 1.2, newPosition.z)
    
    if (glowMeshes[nodeIndex]) {
        glowMeshes[nodeIndex].position.copy(newPosition)
    }
    
    relations.forEach((rel, idx) => {
        if (rel.from === nodeIndex || rel.to === nodeIndex) {
            updateRelationLine(idx)
        }
    })
}

function updateRelationLine(relIndex) {
    const rel = relations[relIndex]
    const start = new THREE.Vector3(nodes[rel.from].x, nodes[rel.from].y, nodes[rel.from].z)
    const end = new THREE.Vector3(nodes[rel.to].x, nodes[rel.to].y, nodes[rel.to].z)
    
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5)
    const distance = start.distanceTo(end)
    mid.y += distance * 0.1
    
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end)
    
    const line = group.children.find(c => c.userData && c.userData.relationIndex === relIndex && c.type === 'Line')
    const tube = group.children.find(c => c.userData && c.userData.relationIndex === relIndex && c.geometry && c.geometry.type === 'TubeGeometry')
    const particle = flowParticles.find(p => p.userData && p.userData.relationIndex === relIndex)
    
    if (line) {
        const points = curve.getPoints(50)
        line.geometry.setFromPoints(points)
    }
    if (tube) {
        tube.geometry.dispose()
        tube.geometry = new THREE.TubeGeometry(curve, 32, 0.03, 8, false)
    }
    if (particle) {
        particle.userData.curve = curve
    }
}

window.addEventListener("mousedown", e => {
    if (e.button !== 0) return
    
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        selectedMesh = obj
        isDragging = true
        controls.enabled = false
        
        dragPlane.setFromNormalAndCoplanarPoint(
            camera.getWorldDirection(new THREE.Vector3()).normalize(),
            obj.position
        )
        
        const targetPoint = new THREE.Vector3()
        raycaster.ray.intersectPlane(dragPlane, targetPoint)
        dragOffset.copy(targetPoint).sub(obj.position)
        
        document.body.style.cursor = 'grabbing'
    }
})

window.addEventListener("mouseup", () => {
    if (isDragging) {
        isDragging = false
        controls.enabled = true
        document.body.style.cursor = 'default'
    }
})

window.addEventListener("click", e => {
    if (isDragging) return
    
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        
        meshes.forEach(mesh => {
            if (mesh !== obj) {
                mesh.scale.set(1, 1, 1)
            }
        })
        
        obj.scale.set(2, 2, 2)
        selectedMesh = obj
        
        nodeName.textContent = obj.userData.name
        nodeDesc.textContent = obj.userData.desc
        detail.style.display = "block"
    } else {
        meshes.forEach(mesh => mesh.scale.set(1, 1, 1))
        selectedMesh = null
        detail.style.display = "none"
    }
})

window.addEventListener("dblclick", e => {
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        const nodeIndex = obj.userData.index
        
        const connectedNodes = new Set()
        connectedNodes.add(nodeIndex)
        
        relations.forEach(rel => {
            if (rel.from === nodeIndex) connectedNodes.add(rel.to)
            if (rel.to === nodeIndex) connectedNodes.add(rel.from)
        })
        
        meshes.forEach((mesh, idx) => {
            if (connectedNodes.has(idx)) {
                mesh.visible = true
                mesh.material.opacity = 1
                if (glowMeshes[idx]) {
                    glowMeshes[idx].visible = true
                }
            } else {
                mesh.visible = false
                if (glowMeshes[idx]) {
                    glowMeshes[idx].visible = false
                }
            }
        })
        
        labelObjs.forEach((label, idx) => {
            label.visible = connectedNodes.has(idx)
        })
        
        group.children.forEach(child => {
            if (child.userData && child.userData.relationType) {
                const rel = relations.find(r => 
                    (r.from === nodeIndex && child.userData.relationType === r.type) ||
                    (r.to === nodeIndex && child.userData.relationType === r.type)
                )
                child.visible = rel && (connectedNodes.has(rel.from) && connectedNodes.has(rel.to))
            }
        })
        
        const targetPos = obj.position.clone()
        const startPos = camera.position.clone()
        const startTarget = controls.target.clone()
        let progress = 0
        
        function animateCamera() {
            progress += 0.05
            if (progress > 1) progress = 1
            
            const easeProgress = 1 - Math.pow(1 - progress, 3)
            
            camera.position.lerpVectors(startPos, targetPos.clone().add(new THREE.Vector3(0, 0, 20)), easeProgress)
            controls.target.lerpVectors(startTarget, targetPos, easeProgress)
            
            if (progress < 1) {
                requestAnimationFrame(animateCamera)
            }
        }
        animateCamera()
    }
})

window.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        meshes.forEach((mesh, idx) => {
            mesh.visible = true
            mesh.material.opacity = 0.95
            if (glowMeshes[idx]) {
                glowMeshes[idx].visible = true
            }
        })
        labelObjs.forEach(label => label.visible = true)
        group.children.forEach(child => {
            if (child.userData && child.userData.relationType) {
                child.visible = true
            }
        })
    }
})

function closeDetail() {
    const detail = document.getElementById('detail')
    detail.style.display = 'none'
    selectedMesh = null
}

function updateHover() {
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0 && !isDragging) {
        const obj = intersects[0].object
        if (hoveredMesh !== obj) {
            if (hoveredMesh && hoveredMesh !== selectedMesh) {
                hoveredMesh.material.emissiveIntensity = 0.4
                if (hoveredMesh !== selectedMesh) {
                    hoveredMesh.scale.set(1, 1, 1)
                }
            }
            hoveredMesh = obj
            hoveredMesh.material.emissiveIntensity = 0.9
            if (hoveredMesh !== selectedMesh) {
                hoveredMesh.scale.set(1.3, 1.3, 1.3)
            }
            
            // 悬停时显示实体详情
            nodeName.textContent = obj.userData.name
            nodeDesc.textContent = obj.userData.desc
            detail.style.display = "block"
            
            document.body.style.cursor = 'pointer'
        }
    } else {
        if (hoveredMesh && hoveredMesh !== selectedMesh) {
            hoveredMesh.material.emissiveIntensity = 0.4
            if (hoveredMesh !== selectedMesh) {
                hoveredMesh.scale.set(1, 1, 1)
            }
            hoveredMesh = null
        }
        if (!isDragging) {
            document.body.style.cursor = 'default'
        }
        // 鼠标移出时隐藏详情（如果没有选中节点）
        if (!selectedMesh) {
            detail.style.display = 'none'
        }
    }
}

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(window.innerWidth, window.innerHeight)
    labelRenderer.setSize(window.innerWidth, window.innerHeight)

let time = 0

function fixLabelContainers() {
    const lr = document.querySelector('.label-renderer')
    if (lr) {
        lr.style.background = 'transparent'
        lr.style.backgroundColor = 'transparent'
        const children = lr.querySelectorAll(':scope > div')
        children.forEach(child => {
            child.style.background = 'transparent'
            child.style.backgroundColor = 'transparent'
            const inner = child.querySelectorAll('div:not(.label)')
            inner.forEach(c => {
                c.style.background = 'transparent'
                c.style.backgroundColor = 'transparent'
            })
        })
    }
}

function animate() {
    requestAnimationFrame(animate)
    time += 0.016
    
    controls.update()
    
    meshes.forEach((mesh, i) => {
        const scale = 1 + Math.sin(time * 2 + i * 0.5) * 0.05
        if (mesh !== hoveredMesh) {
            mesh.scale.set(scale, scale, scale)
        }
    })
    
    pointLight1.position.x = Math.sin(time * 0.5) * 25
    pointLight1.position.z = Math.cos(time * 0.5) * 25
    pointLight2.position.x = Math.cos(time * 0.3) * 20
    pointLight2.position.z = Math.sin(time * 0.3) * 20
    pointLight3.position.y = Math.sin(time * 0.4) * 15
    
    flowParticles.forEach((particle, i) => {
        particle.userData.progress += particle.userData.speed
        if (particle.userData.progress > 1) {
            particle.userData.progress = 0
        }
        const pos = particle.userData.curve.getPoint(particle.userData.progress)
        particle.position.copy(pos)
        
        const scale = 1 + Math.sin(time * 3 + i) * 0.3
        particle.scale.set(scale, scale, scale)
    })
    
    updateHover()
    
    renderer.render(scene, camera)
    labelRenderer.render(scene, camera)
    
    if (Math.floor(time * 60) % 30 === 0) {
        fixLabelContainers()
    }
}

    // 重置节点位置
    nodes.forEach((node, index) => {
        const initialPos = initialNodePositions[index];
        node.x = initialPos.x;
        node.y = initialPos.y;
        node.z = initialPos.z;
        
        if (meshes[index]) {
            meshes[index].position.set(initialPos.x, initialPos.y, initialPos.z);
        }
        
        if (glowMeshes[index]) {
            glowMeshes[index].position.set(initialPos.x, initialPos.y, initialPos.z);
        }
        
        if (labelObjs[index]) {
            const radius = node.type === "core" ? 1.8 : node.type === "device" ? 1.0 : 0.85;
            labelObjs[index].position.set(initialPos.x, initialPos.y + radius + 1.2, initialPos.z);
        }
    });
    
    // 重置关系线条
    relations.forEach((rel, idx) => {
        updateRelationLine(idx);
    });
    
    // 显示所有节点和关系
    meshes.forEach(mesh => {
        mesh.visible = true;
        mesh.material.opacity = 0.95;
        mesh.scale.set(1, 1, 1);
    });
    
    glowMeshes.forEach(glow => {
        if (glow) glow.visible = true;
    });
    
    labelObjs.forEach(label => {
        label.visible = true;
    });
    
    group.children.forEach(child => {
        if (child.userData && child.userData.relationType) {
            child.visible = true;
        }
    });
    
    // 隐藏详情面板
    detail.style.display = 'none';
    selectedMesh = null;
    hoveredMesh = null;
});

// 筛选功能
btnFilter.addEventListener('click', () => {
    const entityType = document.getElementById('filter-entity-type').value;
    const relationType = document.getElementById('filter-relation-type').value;
    const entityName = document.getElementById('filter-entity-name').value.toLowerCase();
    const relationName = document.getElementById('filter-relation-name').value.toLowerCase();
    const attrName = document.getElementById('filter-attr-name').value.toLowerCase();
    const attrValue = document.getElementById('filter-attr-value').value.toLowerCase();
    
    // 筛选节点
    const visibleNodes = new Set();
    
    meshes.forEach((mesh, index) => {
        const node = nodes[index];
        const typeMatch = entityType === 'all' || node.type === entityType;
        const nameMatch = !entityName || node.name.toLowerCase().includes(entityName);
        
        // 属性筛选
        let attrMatch = true;
        if (attrName || attrValue) {
            const nodeAttrs = Object.entries(node).filter(([k]) => !['name', 'type', 'desc', 'x', 'y', 'z'].includes(k));
            if (attrName && attrValue) {
                attrMatch = nodeAttrs.some(([k, v]) => k.toLowerCase().includes(attrName) && String(v).toLowerCase().includes(attrValue));
            } else if (attrName) {
                attrMatch = nodeAttrs.some(([k]) => k.toLowerCase().includes(attrName));
            } else if (attrValue) {
                attrMatch = nodeAttrs.some(([_, v]) => String(v).toLowerCase().includes(attrValue));
            }
        }
        
        if (typeMatch && nameMatch && attrMatch) {
            mesh.visible = true;
            mesh.material.opacity = 1;
            visibleNodes.add(index);
            if (glowMeshes[index]) {
                glowMeshes[index].visible = true;
            }
            if (labelObjs[index]) {
                labelObjs[index].visible = true;
            }
        } else {
            mesh.visible = false;
            if (glowMeshes[index]) {
                glowMeshes[index].visible = false;
            }
            if (labelObjs[index]) {
                labelObjs[index].visible = false;
            }
        }
    });
    
    // 筛选关系
    group.children.forEach(child => {
        if (child.userData && child.userData.relationType) {
            const relType = child.userData.relationType;
            const relIndex = child.userData.relationIndex;
            const rel = relations[relIndex];
            const relTypeInfo = relationTypes[relType];
            
            const typeMatch = relationType === 'all' || relType === relationType;
            const nodesVisible = visibleNodes.has(rel.from) && visibleNodes.has(rel.to);
            const nameMatch = !relationName || relTypeInfo.name.toLowerCase().includes(relationName);
            
            child.visible = typeMatch && nodesVisible && nameMatch;
        }
    });
    
    // 隐藏详情面板如果选中的节点被筛选掉
    if (selectedMesh && !selectedMesh.visible) {
        detail.style.display = 'none';
        selectedMesh = null;
    }
});

// 清除筛选
btnClear.addEventListener('click', () => {
    // 重置筛选条件
    document.getElementById('filter-entity-type').value = 'all';
    document.getElementById('filter-relation-type').value = 'all';
    document.getElementById('filter-entity-name').value = '';
    document.getElementById('filter-relation-name').value = '';
    document.getElementById('filter-attr-name').value = '';
    document.getElementById('filter-attr-value').value = '';
    
    // 显示所有节点和关系
    meshes.forEach(mesh => {
        mesh.visible = true;
        mesh.material.opacity = 0.95;
    });
    
    glowMeshes.forEach(glow => {
        if (glow) glow.visible = true;
    });
    
    labelObjs.forEach(label => {
        label.visible = true;
    });
    
    group.children.forEach(child => {
        if (child.userData && child.userData.relationType) {
            child.visible = true;
        }
    });
    
    // 隐藏详情面板
    detail.style.display = 'none';
    selectedMesh = null;
    hoveredMesh = null;
});
</script>
</body>
</html>
