<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>水泥工艺知识图谱 3D 可视化</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/renderers/CSS2DRenderer.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:radial-gradient(ellipse at center,#0a1628 0%,#050a14 40%,#020408 100%);color:#e6edf3;overflow:hidden}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(100,200,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(100,200,255,0.05) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;animation:gridMove 20s linear infinite}

body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 80%,rgba(100,200,255,0.1) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(0,212,255,0.08) 0%,transparent 40%),radial-gradient(circle at 50% 50%,rgba(110,180,255,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;animation:glowPulse 8s ease-in-out infinite alternate}

@keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
}

@keyframes glowPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}
#container{width:100vw;height:100vh}

#detail{position:fixed;left:20px;top:20px;width:340px;background:rgba(5,10,30,0.95);padding:20px;border-radius:14px;display:none;backdrop-filter:blur(12px);border:1px solid rgba(100,200,255,0.3);box-shadow:0 8px 32px rgba(0,0,0,0.8);z-index:1000;animation:slideIn 0.3s ease;max-height:calc(100vh - 40px);overflow-y:auto}
#detail h3{color:#6eb5ff;margin-bottom:12px;font-size:18px;text-shadow:0 0 20px rgba(110,180,255,0.8)}
#detail p{font-size:14px;line-height:1.8;color:#b0c8e8}
.label{color:#fff;font-size:11px;padding:4px 10px;background:rgba(5,10,30,0.9)!important;border-radius:6px;white-space:nowrap;border:1px solid rgba(100,200,255,0.4);text-shadow:0 0 10px rgba(110,180,255,0.8);pointer-events:none}
.relation-label{color:#fff;font-size:10px;padding:2px 6px;background:rgba(0,0,0,0.6)!important;border-radius:4px;border:1px solid rgba(100,200,255,0.3);white-space:nowrap;pointer-events:none;text-shadow:0 0 8px rgba(110,180,255,0.6)}
.label-renderer,.label-renderer *{background:transparent!important;background-color:transparent!important}
.label-renderer > div{background:transparent!important;background-color:transparent!important}
.label-renderer div:not(.label):not(.relation-label){background:transparent!important;background-color:transparent!important}
.title{position:fixed;top:24px;left:50%;transform:translateX(-50%);font-size:28px;font-weight:bold;background:linear-gradient(135deg,#6eb5ff,#00d4ff,#ff6b9d);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;letter-spacing:2px;animation:fadeIn 0.5s ease;z-index:100}
.tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:13px;color:#6080a0;background:rgba(5,10,30,0.9);padding:12px 24px;border-radius:24px;border:1px solid rgba(100,200,255,0.2);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:fadeIn 0.5s ease;transition:all 0.3s ease;z-index:50}
.tip:hover{border-color:rgba(100,200,255,0.35);color:#7a9abf}
.legend{position:fixed;bottom:24px;left:20px;background:rgba(5,10,30,0.95);padding:16px 20px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:fadeIn 0.5s ease;transition:all 0.3s ease;max-height:calc(100vh - 120px);overflow-y:auto}
.legend-item{display:flex;align-items:center;margin:6px 0;font-size:12px;color:#a0c0e0}
.legend-dot{width:12px;height:12px;border-radius:50%;margin-right:10px;box-shadow:0 0 10px currentColor}
.legend:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}
.legend::-webkit-scrollbar{width:4px}
.legend::-webkit-scrollbar-track{background:transparent}
.legend::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

.control-panel{position:fixed;bottom:24px;right:20px;background:rgba(5,10,30,0.95);padding:10px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:100;transition:all 0.3s ease}

.control-panel:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

.control-buttons{display:flex;flex-direction:column;gap:6px}

.control-btn{width:42px;height:42px;border:none;border-radius:10px;background:linear-gradient(135deg,rgba(100,200,255,0.15),rgba(100,200,255,0.05));color:#6eb5ff;font-size:16px;cursor:pointer;transition:all 0.25s ease;display:flex;align-items:center;justify-content:center;border:1px solid rgba(100,200,255,0.2)}

.control-btn:hover{background:linear-gradient(135deg,rgba(100,200,255,0.3),rgba(100,200,255,0.15));transform:translateY(-2px);box-shadow:0 4px 15px rgba(110,180,255,0.4);border-color:rgba(100,200,255,0.4);color:#fff}

.control-btn:active{transform:translateY(0) scale(0.95)}

.control-btn i{font-size:14px}

.filter-panel{position:fixed;top:60px;right:20px;background:rgba(5,10,30,0.95);padding:12px;border-radius:14px;border:1px solid rgba(100,200,255,0.3);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.8);z-index:1000;min-width:200px;transition:all 0.3s ease}

.filter-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(100,200,255,0.1)}

.filter-header span{color:#6eb5ff;font-size:14px;font-weight:600}

.toggle-icon{color:#6eb5ff;font-size:12px;transition:transform 0.3s ease}

.filter-panel.collapsed .toggle-icon{transform:rotate(-90deg)}

.filter-panel.collapsed .filter-controls{display:none}

.filter-controls{display:flex;flex-direction:column;gap:12px;transition:display 0.3s ease}

.filter-row{display:flex;flex-direction:column;gap:4px}

.filter-row label{color:#a0c0e0;font-size:12px;font-weight:500}

.filter-row input{padding:8px 12px;border:1px solid rgba(100,200,255,0.3);border-radius:8px;background:rgba(10,20,40,0.9);color:#a0c0e0;font-size:12px;width:100%}

.filter-row input:focus{outline:none;border-color:#6eb5ff;box-shadow:0 0 12px rgba(110,180,255,0.25)}

/* 自定义下拉框样式 */
.custom-select{position:relative;width:100%;cursor:pointer}

.select-value{padding:8px 12px;border:1px solid rgba(100,200,255,0.3);border-radius:8px;background:rgba(10,20,40,0.9);color:#a0c0e0;font-size:12px;display:flex;justify-content:space-between;align-items:center}

.select-arrow{font-size:10px;color:#6eb5ff;transition:transform 0.2s ease}

.custom-select .select-options{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#0a1428 !important;border:1px solid rgba(100,200,255,0.3);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.8);max-height:200px;overflow-y:auto;z-index:1001;display:none}

.select-option{padding:8px 12px;color:#a0c0e0;font-size:12px;cursor:pointer;transition:all 0.25s ease}

.select-option:hover{background:rgba(110,180,255,0.25);color:#ffffff}

.select-option.selected{background:rgba(100,200,255,0.4);color:#6eb5ff}

.custom-select.open .select-arrow{transform:rotate(180deg)}

.custom-select.open .select-options{display:block}

.filter-actions{display:flex;gap:10px;margin-top:8px}

.filter-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(100,200,255,0.3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s ease}

#btn-apply{background:#6eb5ff;color:#ffffff}

#btn-apply:hover{background:#5aa8ff;transform:translateY(-1px)}

#btn-reset-filter{background:transparent;color:#6eb5ff}

#btn-reset-filter:hover{background:rgba(100,200,255,0.1);border-color:rgba(100,200,255,0.5)}

@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}



.legend{position:fixed;bottom:24px;left:20px;background:rgba(5,10,30,0.95);padding:16px 20px;border-radius:14px;border:1px solid rgba(100,200,255,0.25);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:fadeIn 0.5s ease;transition:all 0.3s ease;max-height:calc(100vh - 120px);overflow-y:auto}

.legend:hover{border-color:rgba(100,200,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 20px rgba(110,180,255,0.1)}

.legend::-webkit-scrollbar{width:4px}

.legend::-webkit-scrollbar-track{background:transparent}

.legend::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

#detail::-webkit-scrollbar{width:4px}

#detail::-webkit-scrollbar-track{background:transparent}

#detail::-webkit-scrollbar-thumb{background:rgba(100,200,255,0.3);border-radius:2px}

#detail h3{color:#6eb5ff;margin-bottom:12px;font-size:18px;text-shadow:0 0 20px rgba(110,180,255,0.8);display:flex;align-items:center;gap:10px}

#detail h3::before{content:'\f05a';font-family:'Font Awesome 6 Free';font-weight:900;font-size:16px;color:#6eb5ff}

#detail p{font-size:14px;line-height:1.8;color:#b0c8e8;text-align:justify}

.detail-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.2);color:#6eb5ff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;font-size:12px}

.detail-close:hover{background:rgba(100,200,255,0.2);border-color:rgba(100,200,255,0.4);transform:scale(1.05)}

.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease}

.loading-overlay.hidden{opacity:0;pointer-events:none}

.loading-spinner{width:50px;height:50px;border:3px solid rgba(100,200,255,0.2);border-top-color:#6eb5ff;border-radius:50%;animation:spin 1s linear infinite}

.loading-text{margin-top:20px;color:#6eb5ff;font-size:14px;letter-spacing:2px}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载图谱...</div>
</div>
<div id="container"></div>
<div class="title">水泥工艺知识图谱 · 3D可视化</div>
<div id="detail">
    <button class="detail-close" onclick="closeDetail()" title="关闭"><i class="fas fa-times"></i></button>
    <h3 id="nodeName"></h3>
    <p id="nodeDesc"></p>
</div>

<div class="filter-panel collapsed" id="filterPanel">
    <div class="filter-header" onclick="toggleFilterPanel()">
        <span>筛选条件</span>
        <i class="fas fa-chevron-down toggle-icon"></i>
    </div>
    <div class="filter-controls">
        <div class="filter-row">
            <label>实体类型：</label>
            <div class="custom-select" id="custom-entity-type">
                <div class="select-value">全部</div>
                <div class="select-arrow">▼</div>
                <div class="select-options">
                    <div class="select-option" data-value="all">全部</div>
                    <div class="select-option" data-value="factory">工厂</div>
                    <div class="select-option" data-value="production_line">产线</div>
                    <div class="select-option" data-value="operation">工序</div>
                    <div class="select-option" data-value="system">系统</div>
                    <div class="select-option" data-value="equipment_category">设备类别</div>
                    <div class="select-option" data-value="equipment">设备</div>
                    <div class="select-option" data-value="point">测点</div>
                    <div class="select-option" data-value="raw_material">原料</div>
                    <div class="select-option" data-value="indicator">指标</div>
                    <div class="select-option" data-value="product">产品</div>
                    <div class="select-option" data-value="quality_check">质检</div>
                </div>
            </div>
        </div>
        <div class="filter-row">
            <label>实体属性：</label>
            <input type="text" id="filter-attr-name" placeholder="输入属性名称">
        </div>
        <div class="filter-row">
            <label>属性值：</label>
            <input type="text" id="filter-attr-value" placeholder="输入属性值">
        </div>
        <div class="filter-row">
            <label>关系类型：</label>
            <div class="custom-select" id="custom-relation-type">
                <div class="select-value">全部</div>
                <div class="select-arrow">▼</div>
                <div class="select-options">
                    <div class="select-option" data-value="all">全部</div>
                    <div class="select-option" data-value="include">包含</div>
                    <div class="select-option" data-value="belong_to">隶属于</div>
                    <div class="select-option" data-value="flow_to">工艺流向</div>
                    <div class="select-option" data-value="equip_for">设备支撑</div>
                    <div class="select-option" data-value="has_point">含有测点</div>
                    <div class="select-option" data-value="use_material">使用原料</div>
                    <div class="select-option" data-value="produce_product">产出产品</div>
                    <div class="select-option" data-value="has_indicator">关联指标</div>
                    <div class="select-option" data-value="check_quality">质量检测</div>
                </div>
            </div>
        </div>
        <div class="filter-row">
            <label>展示层级：</label>
            <div class="custom-select" id="custom-level">
                <div class="select-value">全部层级</div>
                <div class="select-arrow">▼</div>
                <div class="select-options">
                    <div class="select-option" data-value="all">全部层级</div>
                    <div class="select-option" data-value="1">第1层</div>
                    <div class="select-option" data-value="2">第2层</div>
                    <div class="select-option" data-value="3">第3层</div>
                    <div class="select-option" data-value="4">第4层</div>
                </div>
            </div>
        </div>
        <div class="filter-actions">
            <button class="filter-btn" id="btn-apply">应用筛选</button>
            <button class="filter-btn" id="btn-reset-filter">重置</button>
        </div>
    </div>
</div>

<div class="control-panel">
    <div class="control-buttons">
        <button class="control-btn" title="放大" id="btn-zoom-in"><i class="fas fa-plus"></i></button>
        <button class="control-btn" title="缩小" id="btn-zoom-out"><i class="fas fa-minus"></i></button>
        <button class="control-btn" title="全屏" id="btn-fullscreen"><i class="fas fa-expand"></i></button>
        <button class="control-btn" title="下载" id="btn-download"><i class="fas fa-download"></i></button>
        <button class="control-btn" title="分享" id="btn-share"><i class="fas fa-share-alt"></i></button>
        <button class="control-btn" title="恢复初始状态" id="btn-reset"><i class="fas fa-sync-alt"></i></button>
    </div>
</div>
<div class="tip">水泥生产工艺：两磨一烧 · 全过程智能知识图谱</div>
<div class="legend">
    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(100,200,255,0.15)">
        <div style="font-size:12px;color:#6eb5ff;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-cube" style="font-size:10px"></i>实体类型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b35;color:#ff6b35"></div>工厂</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff9f1c;color:#ff9f1c"></div>产线</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;color:#00d4ff"></div>工序</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2ec4b6;color:#2ec4b6"></div>系统</div>
        <div class="legend-item"><div class="legend-dot" style="background:#9b5de5;color:#9b5de5"></div>设备类别</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b9d;color:#ff6b9d"></div>设备</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00f5d4;color:#00f5d4"></div>测点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7;color:#a855f7"></div>原料</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a86ff;color:#3a86ff"></div>指标</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffbe0b;color:#ffbe0b"></div>产品</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb5607;color:#fb5607"></div>质检</div>
    </div>
    <div>
        <div style="font-size:12px;color:#6eb5ff;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-link" style="font-size:10px"></i>关系类型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6eb5ff;color:#6eb5ff"></div>包含</div>
        <div class="legend-item"><div class="legend-dot" style="background:#9b5de5;color:#9b5de5"></div>隶属于</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;color:#00d4ff"></div>工艺流向</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7;color:#a855f7"></div>设备支撑</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f15bb5;color:#f15bb5"></div>含有测点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb5607;color:#fb5607"></div>使用原料</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a86ff;color:#3a86ff"></div>产出产品</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00f5d4;color:#00f5d4"></div>关联指标</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff9f1c;color:#ff9f1c"></div>质量检测</div>
    </div>
</div>

<script>
const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000)
camera.position.set(0, 5, 43.75)

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.setClearColor(0x000000, 0)
document.getElementById("container").appendChild(renderer.domElement)

const labelRenderer = new THREE.CSS2DRenderer()
labelRenderer.setSize(window.innerWidth, window.innerHeight)
labelRenderer.domElement.style.position = "fixed"
labelRenderer.domElement.style.top = "0"
labelRenderer.domElement.style.left = "0"
labelRenderer.domElement.style.pointerEvents = "none"
labelRenderer.domElement.style.background = "transparent"
labelRenderer.domElement.style.backgroundColor = "transparent"
labelRenderer.domElement.classList.add('label-renderer')
document.body.appendChild(labelRenderer.domElement)

const style = document.createElement('style')
style.textContent = `
  .css2d-container, .css2d-container * {
    background: transparent !important;
    background-color: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }
  .css2d-container > div {
    background: transparent !important;
    background-color: transparent !important;
  }
`
document.head.appendChild(style)

setTimeout(() => {
  const allDivs = document.querySelectorAll('body > div')
  allDivs.forEach(div => {
    if (div.id !== 'container' && !div.classList.contains('title') && 
        !div.id.includes('info') && !div.id.includes('detail') && 
        !div.classList.contains('tip') && !div.classList.contains('legend')) {
      div.style.background = 'transparent'
      div.style.backgroundColor = 'transparent'
      const children = div.querySelectorAll('*')
      children.forEach(c => {
        if (!c.classList.contains('label') && !c.classList.contains('relation-label')) {
          c.style.background = 'transparent'
          c.style.backgroundColor = 'transparent'
        }
      })
    }
  })
}, 100)

const controls = new THREE.OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.05
controls.minDistance = 15
controls.maxDistance = 80
controls.autoRotate = true
controls.autoRotateSpeed = 0.3

const ambientLight = new THREE.AmbientLight(0x202040, 0.3)
scene.add(ambientLight)

const pointLight1 = new THREE.PointLight(0x6eb5ff, 2, 150)
pointLight1.position.set(20, 20, 20)
scene.add(pointLight1)

const pointLight2 = new THREE.PointLight(0xff6b9d, 1.5, 150)
pointLight2.position.set(-20, -10, 20)
scene.add(pointLight2)

const pointLight3 = new THREE.PointLight(0x00d4ff, 1, 120)
pointLight3.position.set(0, -20, -20)
scene.add(pointLight3)

const group = new THREE.Group()
scene.add(group)

const colors = {
    factory: 0xff6b35,      // 橙红色
    production_line: 0xff9f1c, // 橙色
    operation: 0x00d4ff,     // 天蓝色
    system: 0x2ec4b6,       // 青色

// 保存初始状态
const initialCameraPosition = new THREE.Vector3(0, 5, 35);
const initialCameraTarget = new THREE.Vector3(0, 0, 0);
const initialNodePositions = nodes.map(node => ({ x: node.x, y: node.y, z: node.z }));

const meshes = []
const labelObjs = []
const glowMeshes = []

nodes.forEach((node, i) => {
    const color = colors[node.type] || colors.operation
    const radius = node.type === "factory" ? 2.5 : 
                   node.type === "production_line" ? 2.0 :
                   node.type === "operation" ? 1.7 :
                   node.type === "system" ? 1.4 :
                   node.type === "equipment_category" ? 1.2 :
                   node.type === "equipment" ? 1.1 :
                   node.type === "point" ? 0.8 :
                   node.type === "raw_material" ? 1.0 :
                   node.type === "indicator" ? 0.9 :
                   node.type === "product" ? 1.1 :
                   node.type === "quality_check" ? 1.0 : 1.0
    
    const geo = new THREE.SphereGeometry(radius, 32, 32)
    const mat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.5,
        shininess: 200,
        metalness: 0.7,
        roughness: 0.3,
        transparent: true,
        opacity: 0.9
    })
    const mesh = new THREE.Mesh(geo, mat)
    mesh.position.set(node.x, node.y, node.z)
    mesh.userData = { index: i, name: node.name, desc: node.desc, baseColor: color }
    group.add(mesh)
    meshes.push(mesh)

    const glowGeo = new THREE.SphereGeometry(radius * 1.8, 32, 32)
    const glowMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending
    })
    const glowMesh = new THREE.Mesh(glowGeo, glowMat)
    glowMesh.position.copy(mesh.position)
    group.add(glowMesh)
    glowMeshes.push(glowMesh)

    const div = document.createElement("div")
    div.className = "label"
    div.textContent = node.name
    
    // 为不同类型的实体使用不同的标签样式
    if (node.type === "factory") {
        div.style.fontWeight = "bold"
        div.style.fontSize = "12px"
    } else if (node.type === "production_line") {
        div.style.fontWeight = "600"
        div.style.fontSize = "11px"
    }
    
    const label = new THREE.CSS2DObject(div)
    // 调整标签位置，避免重叠
    const labelOffset = node.type === "factory" ? 1.5 : 
                       node.type === "production_line" ? 1.3 :
                       node.type === "operation" ? 1.2 :
                       1.0
    label.position.set(node.x, node.y + radius + labelOffset, node.z)
    
    // 添加标签淡入动画
    div.style.opacity = "0"
    div.style.transition = "opacity 0.5s ease"
    group.add(label)
    labelObjs.push(label)
    
    // 触发动画
    setTimeout(() => {
        div.style.opacity = "1"
    }, 100 + i * 10)
})

const flowParticles = []

relations.forEach((rel, idx) => {
    const start = new THREE.Vector3(nodes[rel.from].x, nodes[rel.from].y, nodes[rel.from].z)
    const end = new THREE.Vector3(nodes[rel.to].x, nodes[rel.to].y, nodes[rel.to].z)
    const relType = relationTypes[rel.type]
    
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5)
    const distance = start.distanceTo(end)
    mid.y += distance * 0.1
    
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end)
    const points = curve.getPoints(50)
    const geo = new THREE.BufferGeometry().setFromPoints(points)
    
    // 根据关系类型设置线条宽度
    const lineWidth = rel.type === "include" ? 2 : 
                     rel.type === "flow_to" ? 1.5 :
                     1
    
    const mat = new THREE.LineBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 0.6,
        linewidth: lineWidth
    })
    const line = new THREE.Line(geo, mat)
    line.userData = { relationType: rel.type, relationIndex: idx }
    group.add(line)

    const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.05, 8, false)
    const tubeMat = new THREE.MeshBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
    })
    const tube = new THREE.Mesh(tubeGeo, tubeMat)
    tube.userData = { relationType: rel.type, relationIndex: idx }
    group.add(tube)
    
    const midPoint = curve.getPoint(0.5)
    const labelDiv = document.createElement("div")
    labelDiv.className = "relation-label"
    labelDiv.textContent = relType.name
    const r = (relType.color >> 16) & 255
    const g = (relType.color >> 8) & 255
    const b = relType.color & 255
    labelDiv.style.cssText = `
        color: #${relType.color.toString(16).padStart(6, '0')} !important;
        border: 1px solid rgba(${r},${g},${b},0.5) !important;
        text-shadow: 0 0 8px rgba(${r},${g},${b},0.8) !important;
    `
    const relLabel = new THREE.CSS2DObject(labelDiv)
    relLabel.position.set(midPoint.x, midPoint.y, midPoint.z)
    group.add(relLabel)
    
    const flowGeo = new THREE.SphereGeometry(0.2, 16, 16)
    const flowMat = new THREE.MeshBasicMaterial({
        color: relType.color,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending
    })
    const flowParticle = new THREE.Mesh(flowGeo, flowMat)
    flowParticle.userData = { 
        curve: curve, 
        progress: Math.random(), 
        speed: 0.008 + Math.random() * 0.004,
        relationType: rel.type,
        relationIndex: idx
    }
    group.add(flowParticle)
    flowParticles.push(flowParticle)
})



const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()
const detail = document.getElementById("detail")
const nodeName = document.getElementById("nodeName")
const nodeDesc = document.getElementById("nodeDesc")
let hoveredMesh = null
let selectedMesh = null
let isDragging = false
let dragPlane = new THREE.Plane()
let dragOffset = new THREE.Vector3()

window.addEventListener("mousemove", e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1
    
    if (isDragging && selectedMesh) {
        raycaster.setFromCamera(mouse, camera)
        const targetPoint = new THREE.Vector3()
        raycaster.ray.intersectPlane(dragPlane, targetPoint)
        if (targetPoint) {
            selectedMesh.position.copy(targetPoint.sub(dragOffset))
            updateNodePosition(selectedMesh.userData.index, selectedMesh.position)
        }
    }
})

function updateNodePosition(nodeIndex, newPosition) {
    nodes[nodeIndex].x = newPosition.x
    nodes[nodeIndex].y = newPosition.y
    nodes[nodeIndex].z = newPosition.z
    
    labelObjs[nodeIndex].position.set(newPosition.x, newPosition.y + (selectedMesh.geometry.parameters.radius || 0.85) + 1.2, newPosition.z)
    
    if (glowMeshes[nodeIndex]) {
        glowMeshes[nodeIndex].position.copy(newPosition)
    }
    
    relations.forEach((rel, idx) => {
        if (rel.from === nodeIndex || rel.to === nodeIndex) {
            updateRelationLine(idx)
        }
    })
}

function updateRelationLine(relIndex) {
    const rel = relations[relIndex]
    const start = new THREE.Vector3(nodes[rel.from].x, nodes[rel.from].y, nodes[rel.from].z)
    const end = new THREE.Vector3(nodes[rel.to].x, nodes[rel.to].y, nodes[rel.to].z)
    
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5)
    const distance = start.distanceTo(end)
    mid.y += distance * 0.1
    
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end)
    
    const line = group.children.find(c => c.userData && c.userData.relationIndex === relIndex && c.type === 'Line')
    const tube = group.children.find(c => c.userData && c.userData.relationIndex === relIndex && c.geometry && c.geometry.type === 'TubeGeometry')
    const particle = flowParticles.find(p => p.userData && p.userData.relationIndex === relIndex)
    
    if (line) {
        const points = curve.getPoints(50)
        line.geometry.setFromPoints(points)
    }
    if (tube) {
        tube.geometry.dispose()
        tube.geometry = new THREE.TubeGeometry(curve, 32, 0.03, 8, false)
    }
    if (particle) {
        particle.userData.curve = curve
    }
}

window.addEventListener("mousedown", e => {
    if (e.button !== 0) return
    
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        selectedMesh = obj
        isDragging = true
        controls.enabled = false
        
        dragPlane.setFromNormalAndCoplanarPoint(
            camera.getWorldDirection(new THREE.Vector3()).normalize(),
            obj.position
        )
        
        const targetPoint = new THREE.Vector3()
        raycaster.ray.intersectPlane(dragPlane, targetPoint)
        dragOffset.copy(targetPoint).sub(obj.position)
        
        document.body.style.cursor = 'grabbing'
    }
})

window.addEventListener("mouseup", () => {
    if (isDragging) {
        isDragging = false
        controls.enabled = true
        document.body.style.cursor = 'default'
    }
})

window.addEventListener("click", e => {
    if (isDragging) return
    
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        
        meshes.forEach(mesh => {
            if (mesh !== obj) {
                mesh.scale.set(1, 1, 1)
            }
        })
        
        obj.scale.set(2, 2, 2)
        selectedMesh = obj
        
        nodeName.textContent = obj.userData.name
        nodeDesc.textContent = obj.userData.desc
        detail.style.display = "block"
    } else {
        meshes.forEach(mesh => mesh.scale.set(1, 1, 1))
        selectedMesh = null
        detail.style.display = "none"
    }
})

window.addEventListener("dblclick", e => {
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0) {
        const obj = intersects[0].object
        const nodeIndex = obj.userData.index
        
        const connectedNodes = new Set()
        connectedNodes.add(nodeIndex)
        
        relations.forEach(rel => {
            if (rel.from === nodeIndex) connectedNodes.add(rel.to)
            if (rel.to === nodeIndex) connectedNodes.add(rel.from)
        })
        
        meshes.forEach((mesh, idx) => {
            if (connectedNodes.has(idx)) {
                mesh.visible = true
                mesh.material.opacity = 1
                if (glowMeshes[idx]) {
                    glowMeshes[idx].visible = true
                }
            } else {
                mesh.visible = false
                if (glowMeshes[idx]) {
                    glowMeshes[idx].visible = false
                }
            }
        })
        
        labelObjs.forEach((label, idx) => {
            label.visible = connectedNodes.has(idx)
        })
        
        // 获取与选中节点相关的所有关系索引
        const relatedRelIndices = new Set()
        relations.forEach((rel, idx) => {
            if (rel.from === nodeIndex || rel.to === nodeIndex) {
                relatedRelIndices.add(idx)
            }
        })
        
        group.children.forEach(child => {
            // 检查是否是关系相关对象（线条、粒子）
            if (child.userData && (child.userData.relationType || child.userData.curve)) {
                const relIndex = child.userData.relationIndex
                child.visible = relatedRelIndices.has(relIndex)
            }
            // 检查是否是关系标签（CSS2DObject）
            else if (child instanceof THREE.CSS2DObject && child.element && child.element.className === 'relation-label') {
                // 关系标签在group中的顺序与relations数组对应
                // 找到这个标签对应的关系索引
                const labelIndex = group.children.filter(c => c instanceof THREE.CSS2DObject && c.element && c.element.className === 'relation-label').indexOf(child)
                // 需要根据实际创建顺序来确定，这里简化处理：显示所有相关关系的标签
                const relIndex = Array.from(group.children).indexOf(child)
                // 通过查找关系标签在group中的位置来确定对应的关系
                let actualRelIndex = -1
                let labelCount = 0
                for (let i = 0; i < group.children.length; i++) {
                    const c = group.children[i]
                    if (c instanceof THREE.CSS2DObject && c.element && c.element.className === 'relation-label') {
                        if (c === child) {
                            actualRelIndex = labelCount
                            break
                        }
                        labelCount++
                    }
                }
                child.visible = actualRelIndex >= 0 && relatedRelIndices.has(actualRelIndex)
            }
        })
        
        const targetPos = obj.position.clone()
        const startPos = camera.position.clone()
        const startTarget = controls.target.clone()
        let progress = 0
        
        function animateCamera() {
            progress += 0.05
            if (progress > 1) progress = 1
            
            const easeProgress = 1 - Math.pow(1 - progress, 3)
            
            camera.position.lerpVectors(startPos, targetPos.clone().add(new THREE.Vector3(0, 0, 20)), easeProgress)
            controls.target.lerpVectors(startTarget, targetPos, easeProgress)
            
            if (progress < 1) {
                requestAnimationFrame(animateCamera)
            }
        }
        animateCamera()
    }
})

window.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        meshes.forEach((mesh, idx) => {
            mesh.visible = true
            mesh.material.opacity = 0.95
            if (glowMeshes[idx]) {
                glowMeshes[idx].visible = true
            }
        })
        labelObjs.forEach(label => label.visible = true)
        group.children.forEach(child => {
            // 检查是否是关系相关对象（线条、粒子、标签）
            if (child.userData && (child.userData.relationType || child.userData.curve)) {
                child.visible = true
            }
            // 检查是否是关系标签（CSS2DObject）
            else if (child instanceof THREE.CSS2DObject && child.element && child.element.className === 'relation-label') {
                child.visible = true
            }
        })
    }
})

function closeDetail() {
    const detail = document.getElementById('detail')
    detail.style.display = 'none'
    selectedMesh = null
}

function updateHover() {
    raycaster.setFromCamera(mouse, camera)
    const intersects = raycaster.intersectObjects(meshes)
    
    if (intersects.length > 0 && !isDragging) {
        const obj = intersects[0].object
        if (hoveredMesh !== obj) {
            if (hoveredMesh && hoveredMesh !== selectedMesh) {
                hoveredMesh.material.emissiveIntensity = 0.4
                if (hoveredMesh !== selectedMesh) {
                    hoveredMesh.scale.set(1, 1, 1)
                }
                // 恢复光晕效果
                if (glowMeshes[hoveredMesh.userData.index]) {
                    const glowMesh = glowMeshes[hoveredMesh.userData.index]
                    if (glowMesh) {
                        glowMesh.material.opacity = 0.15
                    }
                }
            }
            hoveredMesh = obj
            hoveredMesh.material.emissiveIntensity = 0.9
            if (hoveredMesh !== selectedMesh) {
                hoveredMesh.scale.set(1.3, 1.3, 1.3)
            }
            // 增强光晕效果
            if (glowMeshes[hoveredMesh.userData.index]) {
                const glowMesh = glowMeshes[hoveredMesh.userData.index]
                if (glowMesh) {
                    glowMesh.material.opacity = 0.3
                }
            }
            
            // 悬停时显示实体详情
            nodeName.textContent = obj.userData.name
            nodeDesc.textContent = obj.userData.desc
            detail.style.display = "block"
            
            document.body.style.cursor = 'pointer'
        }
    } else {
        if (hoveredMesh && hoveredMesh !== selectedMesh) {
            hoveredMesh.material.emissiveIntensity = 0.4
            if (hoveredMesh !== selectedMesh) {
                hoveredMesh.scale.set(1, 1, 1)
            }
            // 恢复光晕效果
            if (glowMeshes[hoveredMesh.userData.index]) {
                const glowMesh = glowMeshes[hoveredMesh.userData.index]
                if (glowMesh) {
                    glowMesh.material.opacity = 0.15
                }
            }
            hoveredMesh = null
        }
        if (!isDragging) {
            document.body.style.cursor = 'default'
        }
        // 鼠标移出时隐藏详情（如果没有选中节点）
        if (!selectedMesh) {
            detail.style.display = 'none'
        }
    }
}

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(window.innerWidth, window.innerHeight)
    labelRenderer.setSize(window.innerWidth, window.innerHeight)
})

let time = 0

function fixLabelContainers() {
    const lr = document.querySelector('.label-renderer')
    if (lr) {
        lr.style.background = 'transparent'
        lr.style.backgroundColor = 'transparent'
        const children = lr.querySelectorAll(':scope > div')
        children.forEach(child => {
            if (!child.classList.contains('label') && !child.classList.contains('relation-label')) {
                child.style.background = 'transparent'
                child.style.backgroundColor = 'transparent'
            }
            const inner = child.querySelectorAll('div:not(.label):not(.relation-label)')
            inner.forEach(c => {
                c.style.background = 'transparent'
                c.style.backgroundColor = 'transparent'
            })
        })
    }
}

function animate() {
    requestAnimationFrame(animate)
    time += 0.016
    
    controls.update()
    
    meshes.forEach((mesh, i) => {
        const scale = 1 + Math.sin(time * 2 + i * 0.5) * 0.05
        if (mesh !== hoveredMesh) {
            mesh.scale.set(scale, scale, scale)
        }
    })
    
    pointLight1.position.x = Math.sin(time * 0.5) * 25
    pointLight1.position.z = Math.cos(time * 0.5) * 25
    pointLight2.position.x = Math.cos(time * 0.3) * 20
    pointLight2.position.z = Math.sin(time * 0.3) * 20
    pointLight3.position.y = Math.sin(time * 0.4) * 15
    
    flowParticles.forEach((particle, i) => {
        particle.userData.progress += particle.userData.speed
        if (particle.userData.progress > 1) {
            particle.userData.progress = 0
        }
        const pos = particle.userData.curve.getPoint(particle.userData.progress)
        particle.position.copy(pos)
        
        const scale = 1 + Math.sin(time * 3 + i) * 0.3
        particle.scale.set(scale, scale, scale)
    })
    
    updateHover()
    
    renderer.render(scene, camera)
    labelRenderer.render(scene, camera)
}

    if (loadingOverlay) {

animate()

// 按钮功能实现
const btnZoomIn = document.getElementById('btn-zoom-in');

const btnShare = document.getElementById('btn-share');

// 恢复初始状态
btnResetView.addEventListener('click', () => {
    // 重置相机位置
    camera.position.copy(initialCameraPosition);
    controls.target.copy(initialCameraTarget);
    controls.update();
    
    // 重置节点位置
    nodes.forEach((node, index) => {
        const initialPos = initialNodePositions[index];
        node.x = initialPos.x;
        node.y = initialPos.y;
        node.z = initialPos.z;
        
        if (meshes[index]) {
            meshes[index].position.set(initialPos.x, initialPos.y, initialPos.z);
        }
        
        if (glowMeshes[index]) {
            glowMeshes[index].position.set(initialPos.x, initialPos.y, initialPos.z);
        }
        
        if (labelObjs[index]) {
            const radius = node.type === "factory" ? 2.2 : 
                           node.type === "production_line" ? 1.8 :
                           node.type === "operation" ? 1.5 :
                           node.type === "system" ? 1.3 :
                           node.type === "equipment_category" ? 1.1 :
                           node.type === "equipment" ? 1.0 :
                           node.type === "point" ? 0.7 :
                           node.type === "raw_material" ? 0.9 :
                           node.type === "indicator" ? 0.8 :
                           node.type === "product" ? 1.0 :
                           node.type === "quality_check" ? 0.9 : 1.0;
            labelObjs[index].position.set(initialPos.x, initialPos.y + radius + 1.2, initialPos.z);
        }
    });
    
    // 重置关系线条
    relations.forEach((rel, idx) => {
        updateRelationLine(idx);
    });
    
    // 显示所有节点和关系
    meshes.forEach(mesh => {
        mesh.visible = true;
        mesh.material.opacity = 0.95;
        mesh.scale.set(1, 1, 1);
    });
    
    glowMeshes.forEach(glow => {
        if (glow) glow.visible = true;
    });
    
    labelObjs.forEach(label => {
        label.visible = true;
    });
    
    // 显示所有关系相关对象（线条、标签、粒子）
    group.children.forEach(child => {
        // 检查是否是关系相关对象
        if (child.userData && (child.userData.relationType || child.userData.curve)) {
            child.visible = true;
        }
        // 检查是否是关系标签（CSS2DObject）
        else if (child instanceof THREE.CSS2DObject && child.element && child.element.className === 'relation-label') {
            child.visible = true;
        }
    });
    
    // 隐藏详情面板
    detail.style.display = 'none';
    selectedMesh = null;
    hoveredMesh = null;
});

// 初始化自定义下拉框
function initCustomSelects() {
    const customSelects = document.querySelectorAll('.custom-select');
    
    customSelects.forEach(select => {
        const valueElement = select.querySelector('.select-value');
        const optionsContainer = select.querySelector('.select-options');
        const options = select.querySelectorAll('.select-option');
        
        // 点击下拉框打开/关闭
        valueElement.addEventListener('click', (e) => {
            e.stopPropagation();
            // 关闭其他所有下拉框
            document.querySelectorAll('.custom-select.open').forEach(s => {
                if (s !== select) {
                    s.classList.remove('open');
                }
            });
            // 切换当前下拉框状态
            select.classList.toggle('open');
        });
        
        // 点击选项
        options.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = option.dataset.value;
                const text = option.textContent;
                valueElement.textContent = text;
                
                // 移除所有选中状态
                options.forEach(opt => opt.classList.remove('selected'));
                // 添加当前选中状态
                option.classList.add('selected');
                
                // 关闭下拉框
                select.classList.remove('open');
            });
        });
    });
    
    // 点击页面其他地方关闭下拉框
    document.addEventListener('click', () => {
        document.querySelectorAll('.custom-select.open').forEach(select => {
            select.classList.remove('open');
        });
    });
}

// 获取自定义下拉框的值
function getCustomSelectValue(selectId) {
    const select = document.getElementById(selectId);
    const selectedOption = select.querySelector('.select-option.selected');
    return selectedOption ? selectedOption.dataset.value : 'all';
}

// 筛选功能
btnApplyFilter.addEventListener('click', () => {
    const entityType = getCustomSelectValue('custom-entity-type');
    const relationType = getCustomSelectValue('custom-relation-type');
    const attrName = document.getElementById('filter-attr-name').value.toLowerCase();
    const attrValue = document.getElementById('filter-attr-value').value.toLowerCase();
    const level = getCustomSelectValue('custom-level');
    
    // 筛选节点
    const visibleNodes = new Set();
    
    meshes.forEach((mesh, index) => {
        const node = nodes[index];
        
        // 实体类型筛选
        const typeMatch = entityType === 'all' || node.type === entityType;
        
        // 属性筛选
        let attrMatch = true;
        if (attrName || attrValue) {
            const nodeAttrs = Object.entries(node).filter(([k]) => !['name', 'type', 'desc', 'x', 'y', 'z'].includes(k));
            if (attrName && attrValue) {
                attrMatch = nodeAttrs.some(([k, v]) => k.toLowerCase().includes(attrName) && String(v).toLowerCase().includes(attrValue));
            } else if (attrName) {
                attrMatch = nodeAttrs.some(([k]) => k.toLowerCase().includes(attrName));
            } else if (attrValue) {
                attrMatch = nodeAttrs.some(([_, v]) => String(v).toLowerCase().includes(attrValue));
            }
        }
        
        // 层级筛选
        let levelMatch = true;
        if (level !== 'all') {
            const nodeLevel = getNodeLevel(node);
            levelMatch = nodeLevel == level;
        }
        
        if (typeMatch && attrMatch && levelMatch) {
            mesh.visible = true;
            mesh.material.opacity = 1;
            visibleNodes.add(index);
            if (glowMeshes[index]) {
                glowMeshes[index].visible = true;
            }
            if (labelObjs[index]) {
                labelObjs[index].visible = true;
            }
        } else {
            mesh.visible = false;
            if (glowMeshes[index]) {
                glowMeshes[index].visible = false;
            }
            if (labelObjs[index]) {
                labelObjs[index].visible = false;
            }
        }
    });
    
    // 筛选关系
    group.children.forEach(child => {
        if (child.userData && child.userData.relationType) {
            const relType = child.userData.relationType;
            const relIndex = child.userData.relationIndex;
            const rel = relations[relIndex];
            
            const typeMatch = relationType === 'all' || relType === relationType;
            const nodesVisible = visibleNodes.has(rel.from) && visibleNodes.has(rel.to);
            
            child.visible = typeMatch && nodesVisible;
        }
    });
    
    // 隐藏详情面板如果选中的节点被筛选掉
    if (selectedMesh && !selectedMesh.visible) {
        detail.style.display = 'none';
        selectedMesh = null;
    }
});

// 重置筛选
btnResetFilter.addEventListener('click', () => {
    // 重置筛选条件
    // 重置自定义下拉框
    resetCustomSelect('custom-entity-type', '全部');
    resetCustomSelect('custom-relation-type', '全部');
    resetCustomSelect('custom-level', '全部层级');
    
    // 重置输入框
    document.getElementById('filter-attr-name').value = '';
    document.getElementById('filter-attr-value').value = '';
    
    // 显示所有节点和关系
    meshes.forEach(mesh => {
        mesh.visible = true;
        mesh.material.opacity = 0.95;
    });
    
    glowMeshes.forEach(glow => {
        if (glow) glow.visible = true;
    });
    
    labelObjs.forEach(label => {
        label.visible = true;
    });
    
    group.children.forEach(child => {
        if (child.userData && child.userData.relationType) {
            child.visible = true;
        }
    });
    
    // 隐藏详情面板
    detail.style.display = 'none';
    selectedMesh = null;
    hoveredMesh = null;
});

// 获取节点层级
function getNodeLevel(node) {
    const levelMap = {
        'factory': 1,
        'production_line': 2,
        'operation': 3,
        'system': 3,
        'equipment_category': 3,
        'equipment': 4,
        'point': 4,
        'raw_material': 3,
        'indicator': 3,
        'product': 3,
        'quality_check': 3
    };
    return levelMap[node.type] || 3;
}

// 页面加载完成后初始化自定义下拉框
document.addEventListener('DOMContentLoaded', initCustomSelects);
