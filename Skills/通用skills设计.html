  <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">接收运维需求，连接数据库（MySQL/PostgreSQL/Doris），验证连接和用户权限</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持 SQL 批量执行，拦截危险 SQL（DROP/TRUNCATE 需二次确认），返回执行结果</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">执行全量/增量备份，生成备份清单，rsync 推送至备份路径</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">通过 Prometheus Exporter 监控数据库性能（CPU/连接数/慢查询），生成报告</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">5.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">分析异常日志（连接失败/死锁/慢查询），提供排查方案</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">6.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持用户权限管理（创建账号、分配权限），记录权限操作日志</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">7.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">记录所有运维操作日志，支持审计溯源</span>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">支持格式</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\"><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输入</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">SQL 语句/运维操作类型、数据库连接信息、备份恢复参数</td>\n  </tr><tr style=\"background:#f8f8f8\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输出</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">SQL 执行结果、备份文件 URL、性能报告、异常排查报告、运维日志</td>\n  </tr><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">支持数据库</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">MySQL、PostgreSQL、Doris、MongoDB</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#C03030;border-bottom:2px solid #C03030;padding-bottom:3px;margin-bottom:8px\">保底策略</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\"><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">数据库连接失败</span><span style=\"color:#595959\">：检测网络可达性，提示检查连接信息和防火墙</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">危险 SQL 拦截</span><span style=\"color:#595959\">：要求用户二次确认（输入 CONFIRM），记录操作人</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">备份失败</span><span style=\"color:#595959\">：检查存储空间，自动清理 30 天前旧备份，提供重试方案</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">性能监控异常</span><span style=\"color:#595959\">：提供索引优化和慢查询分析建议</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">5.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">权限不足</span><span style=\"color:#595959\">：返回 403，提示联系 DBA 授权</span>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7F5A00;border-bottom:2px solid #7F5A00;padding-bottom:3px;margin-bottom:8px\">主线步骤</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">1</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">接收请求</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">获取运维需求、数据库连接信息、操作参数</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">2</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">连接校验</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">验证数据库连接，确认用户权限</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">3</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">执行操作</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">SQL 执行/备份恢复/权限管理/监控采集，按类型路由</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">4</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">危险操作确认</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">高危 SQL 需用户二次确认后执行</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">5</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">结果处理</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">输出执行结果、报告、日志</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">6</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">日志记录</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">记录操作人/操作/时间/结果，支持审计</div>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">对 MySQL sales_db 执行全量备份，监控备份过程中的数据库性能，生成报告。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;db_ops&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;db_type&quot;</span>: <span style=\"color:#ce9178\">&quot;MySQL&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;db_info&quot;</span>: {<span style=\"color:#9cdcfe\">&quot;host&quot;</span>: <span style=\"color:#ce9178\">&quot;192.168.1.100&quot;</span>, <span style=\"color:#9cdcfe\">&quot;port&quot;</span>: <span style=\"color:#b5cea8\">3306</span>, <span style=\"color:#9cdcfe\">&quot;db_name&quot;</span>: <span style=\"color:#ce9178\">&quot;sales_db&quot;</span>},\n  <span style=\"color:#9cdcfe\">&quot;operation&quot;</span>: <span style=\"color:#ce9178\">&quot;backup&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;backup_type&quot;</span>: <span style=\"color:#ce9178\">&quot;full&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;backup_path&quot;</span>: <span style=\"color:#ce9178\">&quot;/data/backup/mysql/&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;monitor_performance&quot;</span>: <span style=\"color:#569cd6\">true</span>,\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:DbOps]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">ops_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">backup_file</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">备份文件 URL</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">backup_report</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">备份时间/大小/状态</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">performance_report</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">CPU/内存/连接数指标</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">错误详情</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div><div class=\"tmpl-card\" id=\"tmpl-27\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#0F8060;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">27</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">服务器与资源监控 Skill</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">MonitorSkill</div>\n        <div style=\"font-size:12px;color:#666;margin-top:3px;line-height:1.5\">私有化环境下对企业服务器、系统及各类 Skill 任务进行实时监控与多渠道告警推送，支持自定义阈值、告警抑制与自动溯源，适配完全离线内网部署。</div>\n      </div>\n      <div class=\"tool-toggle\" style=\"color:#999;flex-shrink:0;transition:transform .2s;margin-top:2px;font-size:14px\">›</div>\n    </div>\n    <div class=\"tmpl-body\" style=\"border-top:1px solid #e2e2e2;padding:14px\">\n      <div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">基础信息</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">功能定位</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">企业级统一可观测性底座（Metrics + Logs + Alerts），私有化离线部署，与 Skill 20/24/25 共享同一套基础设施。</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">适用场景</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">服务器 CPU/内存/磁盘实时监控、Skill 任务执行状态监控、异常阈值触发多渠道告警、定期生成运维监控报告、告警抑制与升级管理</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">许可证</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">Prometheus / Alertmanager / Node Exporter: Apache 2.0 | Grafana Enterprise（免费版）: 专有许可（内部部署免费）</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">私有化合规</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">完全合规。Prometheus 全栈 Apache 2.0，无任何限制。Grafana 使用官方 Enterprise 免费版（非 AGPL 版本），内部私有化部署零风险。</td>\n      </tr>\n    </table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">工具栈（国内可用 · 已验证）</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n    <tr style=\"background:#f5f5f5\"><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">工具</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">许可证</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">私有化可用性</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n    <tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">Prometheus</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">Apache 2.0</span></td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">✓ 完全可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">CNCF 毕业项目，指标采集核心，替代原方案中 Zabbix</td>\n    </tr><tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">Node Exporter</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">Apache 2.0</span></td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">✓ 完全可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">服务器 CPU/内存/磁盘/网络指标，无 Agent，Prometheus pull 拉取</td>\n    </tr><tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">Alertmanager</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">Apache 2.0</span></td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">✓ 完全可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">告警路由、抑制、分组，支持企业微信/邮件多渠道</td>\n    </tr><tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">Grafana Enterprise 免费版</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#FFF2CC;color:#7F6000\">专有(内部免费)</span></td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">✓ 内部可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">官方推荐企业私有化方案，功能与 AGPL 版等同，规避 AGPL 风险</td>\n    </tr><tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">Loki + Promtail</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#FFF2CC;color:#7F6000\">AGPLv3</span></td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">✓ 内部可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">日志采集与聚合，内部不修改则合规；与 Grafana 原生集成共用 UI</td>\n    </tr>\n  </table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0A5E48;border-bottom:2px solid #0A5E48;padding-bottom:3px;margin-bottom:8px\">国内部署说明</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\"><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">Docker 镜像</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">建议在联网机器预先 docker save 导出 tar 包，内网 docker load 导入，彻底脱离外网依赖</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">pip/apt 安装</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">所有组件均可通过清华/阿里 apt 镜像或 pip 镜像离线安装，无网络障碍</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">离线启动</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">提供统一 docker-compose.yml，一条命令启动 Prometheus + Grafana + Alertmanager + Loki + Promtail + Node Exporter，总内存约 800MB–1.2GB</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">职责范围</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">接收监控需求，配置监控对象（服务器 IP 列表、Skill 任务名）、监控指标和异常阈值</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">通过 Node Exporter 实时采集服务器运行数据（CPU、内存、磁盘、网络），Promtail 采集日志</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">监控指标超出预设阈值或 Skill 任务失败时，自动通过 Alertmanager 触发多渠道告警</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持企业微信（机器人/应用消息）、内网邮件双渠道推送，可配置告警接收人和频率</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">5.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持告警抑制（静默期）和告警升级（连续告警升级至更高级别接收人）</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">6.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">记录所有异常信息和告警日志，通过 Loki 支持日志全文检索和异常溯源</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">7.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">通过 Grafana 生成可视化监控报告，支持定期导出 PDF</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">8.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">监控系统自身状态，出现监控服务异常时触发自我告警</span>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">支持格式</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\"><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输入</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">监控对象列表（IP/服务名）、监控指标、阈值配置、告警渠道、接收人、告警规则</td>\n  </tr><tr style=\"background:#f8f8f8\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输出</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">实时监控数据（JSON）、告警记录、监控报告（PDF/HTML）、告警日志</td>\n  </tr><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">监控对象</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">内网服务器（Linux/Windows）、Docker 容器、前文全部 Skill 任务、数据库</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#C03030;border-bottom:2px solid #C03030;padding-bottom:3px;margin-bottom:8px\">保底策略</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\"><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">数据采集失败</span><span style=\"color:#595959\">：检查 Node Exporter 是否正常运行，确认 Prometheus targets 状态，重启采集进程</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">告警推送失败</span><span style=\"color:#595959\">：检查企业微信机器人 Webhook 地址、邮件 SMTP 配置，对失败渠道自动重试 3 次</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">误告警过多</span><span style=\"color:#595959\">：提示调整告警阈值或增加 for 持续时间条件，减少瞬时抖动触发的误告警</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">监控对象离线</span><span style=\"color:#595959\">：立即触发&quot;主机不可达&quot;告警，推送至全部接收渠道，提示检查网络和服务状态</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">5.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">监控服务自身异常</span><span style=\"color:#595959\">：Watchdog 探针检测，异常时通过备用渠道（邮件）发出自我告警</span>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7F5A00;border-bottom:2px solid #7F5A00;padding-bottom:3px;margin-bottom:8px\">主线步骤</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">1</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">接收请求</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">获取监控对象列表、指标、阈值、告警规则、渠道和接收人配置</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">2</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">初始化配置</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">生成 Prometheus scrape_configs、Alertmanager rules、Grafana datasource 配置文件</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">3</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">启动服务</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">通过 docker-compose up 拉起全套可观测性栈，验证各组件 health check 通过</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">4</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">实时采集</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">Prometheus 按配置间隔（默认 15s）拉取 Node Exporter 指标，Promtail 持续推送日志到 Loki</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">5</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">异常检测</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">对比采集数据与 alerting rules 阈值，生成 FIRING/RESOLVED 事件</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">6</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">告警推送</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">Alertmanager 路由告警到对应渠道，执行抑制/分组逻辑，推送企业微信和邮件</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">7</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">日志记录</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">所有告警事件写入 Loki，可通过 Grafana Explore 检索</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">8</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">报告生成</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">通过 Grafana API 定期导出监控报告 PDF，推送至指定接收人</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">9</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">持续优化</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">根据告警历史提示用户调整阈值和规则，降低误报率</div>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">监控 3 台内网服务器（192.168.1.101/102/103）和 SpiderSkill 任务执行状态，CPU &gt; 80% 或内存 &gt; 90% 时推送告警至企业微信和内网邮箱，每日生成监控报告。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;monitor_alarm&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;monitor_objects&quot;</span>: [\n    {<span style=\"color:#9cdcfe\">&quot;type&quot;</span>: <span style=\"color:#ce9178\">&quot;server&quot;</span>, <span style=\"color:#9cdcfe\">&quot;ip_list&quot;</span>: [&quot;192.168.1.101&quot;, &quot;192.168.1.102&quot;, &quot;192.168.1.103&quot;]},\n    {<span style=\"color:#9cdcfe\">&quot;type&quot;</span>: <span style=\"color:#ce9178\">&quot;skill&quot;</span>, <span style=\"color:#9cdcfe\">&quot;skill_name&quot;</span>: <span style=\"color:#ce9178\">&quot;SpiderSkill&quot;</span>}\n  ],\n  <span style=\"color:#9cdcfe\">&quot;thresholds&quot;</span>: {<span style=\"color:#9cdcfe\">&quot;cpu_pct&quot;</span>: <span style=\"color:#b5cea8\">80</span>, <span style=\"color:#9cdcfe\">&quot;mem_pct&quot;</span>: <span style=\"color:#b5cea8\">90</span>, <span style=\"color:#9cdcfe\">&quot;skill_fail_retry&quot;</span>: <span style=\"color:#b5cea8\">3</span>},\n  <span style=\"color:#9cdcfe\">&quot;alarm_channels&quot;</span>: [&quot;wechat_work&quot;, &quot;internal_email&quot;],\n  <span style=\"color:#9cdcfe\">&quot;alarm_recipients&quot;</span>: {<span style=\"color:#9cdcfe\">&quot;wechat&quot;</span>: [&quot;user1&quot;,&quot;user2&quot;], <span style=\"color:#9cdcfe\">&quot;email&quot;</span>: [&quot;ops@corp.com&quot;]},\n  <span style=\"color:#9cdcfe\">&quot;report&quot;</span>: {<span style=\"color:#9cdcfe\">&quot;frequency&quot;</span>: <span style=\"color:#ce9178\">&quot;daily&quot;</span>, <span style=\"color:#9cdcfe\">&quot;format&quot;</span>: <span style=\"color:#ce9178\">&quot;pdf&quot;</span>},\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:MonitorAlarm]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">monitor_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | partial | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">real_time_data</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">各监控对象当前指标快照，如 {&quot;192.168.1.101&quot;: {&quot;cpu&quot;:&quot;65%&quot;,&quot;mem&quot;:&quot;78%&quot;}}</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">alarm_records</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">已触发告警列表，含触发时间、级别、推送状态</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">monitor_report</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">报告文件 URL，如 http://10.40.0.184:9001/report_20260412.pdf</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">错误详情列表，含 code、msg、retry 字段</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div></div><div class=\"cat-header\" style=\"background:#FAECE7;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin:20px 0 10px;cursor:pointer;user-select:none\" onclick=\"this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')\">\n    <span style=\"width:10px;height:10px;border-radius:50%;background:#B34A18;display:inline-block;flex-shrink:0\"></span>\n    <h2 style=\"font-size:14px;font-weight:600;color:#7A3010;flex:1;margin:0\">八、AI生成类</h2>\n    <span style=\"font-size:11px;color:#7A3010;opacity:.7\">2 个 Skill</span>\n    <span class=\"cat-toggle\" style=\"color:#7A3010;font-size:12px\">▼</span>\n  </div>\n  <div class=\"cat-body\"><div class=\"tmpl-card\" id=\"tmpl-28\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#B34A18;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">28</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">语音合成 Skill</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">TtsSkill     const TEMPLATE_DATA = CATALOG_DATA;

    let activeMainTab = 'catalog';
    let activeSideTab = 'catalog';
    let searchTerm = '';

    function switchTab(tab, btn) {
        activeSideTab = tab;
        document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderNav();
    }

    function switchMainTab(tab, btn) {
        activeMainTab = tab;
        document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        activeSideTab = tab;
        document.querySelectorAll('.stab').forEach((b, i) => {
            b.classList.toggle('active', ['catalog','template','tools'][i] === tab);
        });
        renderNav();
    }

    function renderNav() {
        const nav = document.getElementById('navList');
        nav.innerHTML = '';
        const q = searchTerm.toLowerCase();

        if (activeSideTab === 'catalog' || activeSideTab === 'template') {
            CATALOG_DATA.forEach((catObj, ci) => {
                const cc = Object.values(CAT_COLORS)[ci] || CAT_COLORS['数据处理类'];
                const catName = catObj.cat.replace(/^[一二三四五六七八]、/, '');
                const matchingSkills = catObj.skills.filter(s =>
                    !q || s.name.includes(q) || s.code.toLowerCase().includes(q) || (s.tools||[]).some(t=>t.toLowerCase().includes(q))
                );
                if (q && !matchingSkills.length) return;
                const catEl = document.createElement('div');
                catEl.className = 'nav-cat';
                catEl.style.color = cc.text;
                catEl.textContent = catObj.cat;
                nav.appendChild(catEl);
                matchingSkills.forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'nav-item';
                    el.innerHTML = `<span class="nav-dot" style="background:${cc.dot}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${s.id}. ${s.name}</span>`;
                    el.onclick = () => {
                        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                        el.classList.add('active');
                        const panel = activeSideTab === 'template' ? 'template' : 'catalog';
                        switchMainTab(panel, document.querySelectorAll('.ttab')[panel === 'catalog' ? 0 : 1]);
                        setTimeout(() => {
                            const target = document.getElementById((panel === 'template' ? 'tmpl' : 'skill') + '-' + s.id);
                            if (target) { target.scrollIntoView({behavior:'smooth',block:'start'}); openCard(target); }
                        }, 50);
                    };
                    nav.appendChild(el);
                });
            });
        } else {
            TOOLS_DATA.forEach(grpObj => {
                const gc = GRP_COLORS[grpObj.grp] || GRP_COLORS['基础设施类'];
                const matchingTools = grpObj.tools.filter(t =>
                    !q || t.name.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) || (t.usedIn||[]).some(u=>u.toLowerCase().includes(q))
                );
                if (q && !matchingTools.length) return;
                const catEl = document.createElement('div');
                catEl.className = 'nav-cat';
                catEl.style.color = gc.text;
                catEl.textContent = grpObj.grp;
                nav.appendChild(catEl);
                matchingTools.forEach(t => {
                    const el = document.createElement('div');
                    el.className = 'nav-item';
                    el.innerHTML = `<span class="nav-dot" style="background:${gc.dot}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${t.id} ${t.name}</span>`;
                    el.onclick = () => {
                        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                        el.classList.add('active');
                        switchMainTab('tools', document.querySelectorAll('.ttab')[2]);
                        setTimeout(() => {
                            const target = document.getElementById('tool-' + t.id);
                            if (target) { target.scrollIntoView({behavior:'smooth',block:'start'}); openCard(target); }
                        }, 50);
                    };
                    nav.appendChild(el);
                });
            });
        }
    }

    function openCard(card) {
        if (!card.classList.contains('open')) card.classList.add('open');
    }

    function toggleCard(card) {
        card.classList.toggle('open');
    }

    function buildCatalog() {
        const container = document.getElementById('catalogContent');
        let html = '';
        CATALOG_DATA.forEach((catObj, ci) => {
            const cc = Object.values(CAT_COLORS)[ci] || CAT_COLORS['数据处理类'];
            html += `<div class="cat-header" style="background:${cc.bg}" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')">
      <span class="nav-dot" style="background:${cc.dot};width:10px;height:10px"></span>
      <h2 style="color:${cc.text}">${catObj.cat}</h2>
      <span style="font-size:11px;color:${cc.text};opacity:.7">${catObj.skills.length} 个 Skill</span>
      <span class="cat-toggle" style="color:${cc.text}">▼</span>
    </div><div class="cat-body">`;
            catObj.skills.forEach(s => {
                html += `<div class="skill-card" id="skill-${s.id}">
        <div class="skill-header" onclick="toggleCard(this.parentElement)">
          <div class="skill-num" style="background:${cc.dot};color:#fff">${s.id}</div>
          <div class="skill-title">
            <div class="skill-name">${s.name}</div>
            <div class="skill-code">${s.code}</div>
            <div class="skill-desc">${s.desc}</div>
          </div>
          ${s.change ? `<span class="tag ${s.change.startsWith('🆕')?'tag-new':s.change.startsWith('⚠')?'tag-renamed':'tag-merged'}" style="flex-shrink:0">${s.change.startsWith('🆕')?'新增':s.change.startsWith('✅')?'增强':'替换'}</span>` : ''}
          <span class="skill-toggle">›</span>
        </div>
        <div class="skill-body">
          <div class="section-label">包含工具</div>
          <div class="tools-grid">${(s.tools||[]).map(t=>`<span class="tool-pill" onclick="goToTool('${t}')">${t}</span>`).join('')}</div>
          <div class="section-label">可选组合方案</div>
          <div class="combo-list">${(s.combos||[]).map(c=>`<div class="combo-item">${c}</div>`).join('')}</div>
          <div class="section-label">适用场景 / 可封装能力</div>
          <div class="info-grid">
            <div class="info-label">适用场景</div><div class="info-val">${s.scenes||''}</div>
            <div class="info-label">可封装能力</div><div class="info-val">${s.encap||''}</div>
          </div>
          ${s.change ? `<div class="change-block" style="margin-top:8px">${s.change}</div>` : ''}
        </div>
      </div>`;
            });
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function buildTemplate(){document.getElementById('templateContent').innerHTML=TMPL_HTML;}

          <div class="section-label">入参 / 出参</div>
          <table class="io-table">
            <tr><th>方向</th><th>参数/字段</th><th>类型</th><th>说明</th></tr>
            ${(t.inputs||[]).map(i=>`<tr><td><span class="io-dir-in">入参</span></td><td class="io-param">${i.param}</td><td class="io-type">${i.type}</td><td>${i.desc}</td></tr>`).join('')}
            ${(t.outputs||[]).map(o=>`<tr><td><span class="io-dir-out">出参</span></td><td class="io-param">${o.param}</td><td class="io-type">${o.type}</td><td>${o.desc}</td></tr>`).join('')}
          </table>
          <div class="section-label">安装 / 下载 / 部署</div>
          <div class="install-block">
            ${t.install.pip ? `<div class="install-row"><div class="install-key">pip</div><div class="install-val">${t.install.pip}</div></div>` : ''}
            ${t.install.apt ? `<div class="install-row"><div class="install-key">apt</div><div class="install-val">${t.install.apt}</div></div>` : ''}
            ${t.install.docker ? `<div class="install-row"><div class="install-key">docker</div><div class="install-val">${t.install.docker}</div></div>` : ''}
            ${t.install.binary ? `<div class="install-row"><div class="install-key">binary</div><div class="install-val">${t.install.binary}</div></div>` : ''}
            <div class="install-row"><div class="install-key">官方</div><div class="install-val">${t.download}</div></div>
            <div class="install-row"><div class="install-key">国内镜像</div><div class="install-val">${t.mirror}</div></div>
          </div>
          <div class="section-label">部署方式</div>
          <div style="font-size:12px;color:var(--text2);padding:4px 0;line-height:1.6">${t.deploy}</div>
          ${t.notes ? `<div class="note-block">${t.notes}</div>` : ''}
        </div>
      </div>`;
            });
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function goToTool(toolName) {
        const ALIAS = {
            '本地llm（qwen/deepseek）':'T15','本地llm（可选）':'T15',
            '本地代码llm（qwen-coder/deepseek-coder）':'T15',
            'mysql/postgresql客户端':'T62','mysql/postgresql 客户端':'T62',
            'paddleocr pp-structure（复用skill9）':'T24',
            '企业微信/钉钉/飞书机器人api':'T46','企业微信/钉钉/飞书机器人 api':'T46',
            'promtail':'T37','loki + promtail':'T38',
            'grafana（复用monitorskill）':'T36',
            '规则引擎（正则）':'T57',
            'fastapi + pyjwt':'T40',
            'pydantic':'T58',
            'requests':'T59',
            'beautifulsoup4':'T60',
            'neo4j community':'T61',
            'bge-m3（向量模型）':'T22','bge-m3':'T22',
            'lightrag（图模式）':'T20','lightrag（图检索）':'T20',
            'stable diffusion（automatic1111）':'T54',
            'comfyui':'T55',
            'flux（black-forest-labs）':'T56',
        };
        const cleanName = toolName.replace(/（复用.*?）/g,'').trim();
        const lc = cleanName.toLowerCase();
        const aliasId = ALIAS[lc] || ALIAS[toolName.toLowerCase()];
        const allTools = TOOLS_DATA.flatMap(g => g.tools);
        const found = aliasId
            ? allTools.find(t => t.id === aliasId)
            : allTools.find(t => t.name === cleanName || t.name.includes(cleanName) || cleanName.includes(t.name.split('（')[0]));
        if (found) {
            switchMainTab('tools', document.querySelectorAll('.ttab')[2]);
            setTimeout(() => {
                const target = document.getElementById('tool-' + found.id);
                if (target) { target.scrollIntoView({behavior:'smooth',block:'start'}); openCard(target); }
            }, 80);
        }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
        searchTerm = this.value.trim();
        renderNav();
        if (searchTerm) {
            const q = searchTerm.toLowerCase();
            if (activeMainTab === 'catalog') {
                document.querySelectorAll('.skill-card').forEach(card => {
                    const text = card.textContent.toLowerCase();
                    const match = text.includes(q);
                    card.style.display = match ? '' : 'none';
                    if (match) openCard(card);
                });
            } else if (activeMainTab === 'template') {
                document.querySelectorAll('.tmpl-card').forEach(card => {
                    const text = card.textContent.toLowerCase();
                    const match = text.includes(q);
                    card.style.display = match ? '' : 'none';
                    if (match) openCard(card);
                });
            } else if (activeMainTab === 'tools') {
                document.querySelectorAll('.tool-card').forEach(card => {
                    const text = card.textContent.toLowerCase();
                    const match = text.includes(q);
                    card.style.display = match ? '' : 'none';
                    if (match) openCard(card);
                });
            }
        } else {
            document.querySelectorAll('.skill-card,.tmpl-card,.tool-card').forEach(c => { c.style.display = ''; });
        }
    });

    buildCatalog();
    buildTemplate();
    buildTools();
    renderNav();
</script>

</body>
</html>
