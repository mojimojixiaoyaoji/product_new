<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级通用工具类 Skills 完整文档</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --blue:#1F4E79;--blue-mid:#2E75B6;--blue-light:#DEEAF1;
            --green:#375623;--green-light:#E2EFDA;
            --purple:#4A3E99;--purple-light:#EEEDFE;
            --amber:#7F6000;--amber-light:#FFF2CC;
            --red:#8B1A1A;--red-light:#FCE4D6;
            --teal:#0F6E56;--teal-light:#E1F5EE;
            --pink:#8B2252;--pink-light:#FBEAF0;
            --coral:#7A3010;--coral-light:#FAECE7;
            --gray:#595959;--gray-light:#F5F5F5;
            --border:#e2e2e2;--bg:#fff;--bg2:#f8f8f8;--text:#1a1a1a;--text2:#666;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;color:var(--text);background:var(--bg2);line-height:1.55}
        a{color:var(--blue-mid);text-decoration:none}
        a:hover{text-decoration:underline}

        /* Layout */
        .app{display:flex;min-height:100vh}
        .sidebar{width:240px;min-width:240px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
        .main{flex:1;min-width:0;display:flex;flex-direction:column}

        /* Sidebar */
        .sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
        .sidebar-header h1{font-size:13px;font-weight:600;color:var(--blue);line-height:1.4;margin-bottom:8px}
        .search-box{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg2);color:var(--text);outline:none}
        .search-box:focus{border-color:var(--blue-mid)}
        .sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
        .stab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
        .stab.active{color:var(--blue-mid);border-bottom-color:var(--blue-mid)}
        .stab:hover:not(.active){background:var(--bg2)}
        .nav-list{flex:1;overflow-y:auto;padding:8px 0}
        .nav-cat{padding:6px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-top:4px}
        .nav-item{display:flex;align-items:center;gap:6px;padding:5px 16px;font-size:12px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .nav-item:hover{background:var(--bg2);color:var(--text)}
        .nav-item.active{background:var(--blue-light);color:var(--blue);border-left-color:var(--blue-mid);font-weight:500}
        .nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .nav-badge{margin-left:auto;font-size:10px;padding:1px 5px;border-radius:10px;flex-shrink:0}

        /* Top tabs */
        .top-tabs{display:flex;align-items:center;gap:2px;padding:10px 16px 0;background:var(--bg);border-bottom:1px solid var(--border)}
        .ttab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;border-radius:6px 6px 0 0}
        .ttab.active{color:var(--blue);border-bottom-color:var(--blue-mid);background:var(--blue-light)}
        .ttab:hover:not(.active){background:var(--bg2)}
        .tab-count{font-size:11px;margin-left:6px;padding:1px 6px;border-radius:10px;background:var(--gray-light);color:var(--gray)}
        .ttab.active .tab-count{background:var(--blue-light);color:var(--blue)}

        /* Content area */
        .content{flex:1;overflow-y:auto;padding:20px 24px}
        .tab-panel{display:none}
        .tab-panel.active{display:block}

        /* Summary cards */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
        .stat-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
        .stat-num{font-size:22px;font-weight:600;color:var(--blue)}
        .stat-label{font-size:11px;color:var(--text2);margin-top:2px}

        /* Category header */
        .cat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin:20px 0 10px;cursor:pointer;user-select:none}
        .cat-header h2{font-size:14px;font-weight:600;flex:1}
        .cat-toggle{font-size:12px;color:var(--text2);transition:transform .2s}
        .cat-header.collapsed .cat-toggle{transform:rotate(-90deg)}
        .cat-body{display:block}
        .cat-body.hidden{display:none}

        /* Skill card */
        .skill-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
        .skill-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s}
        .skill-header:hover{background:var(--bg2)}
        .skill-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
        .skill-title{flex:1;min-width:0}
        .skill-name{font-size:13px;font-weight:500;color:var(--text)}
        .skill-code{font-size:11px;color:var(--blue-mid);font-family:monospace;margin-top:2px}
        .skill-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
        .skill-toggle{font-size:12px;color:var(--text2);flex-shrink:0;transition:transform .2s;margin-top:2px}
        .skill-card.open .skill-toggle{transform:rotate(90deg)}
        .skill-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
        .skill-card.open .skill-body{display:block}

        /* Skill body sections */
        .section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin:12px 0 6px}
        .tools-grid{display:flex;flex-wrap:wrap;gap:5px}
        .tool-pill{font-size:11px;padding:3px 8px;border-radius:12px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
        .tool-pill:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
        .combo-list{display:flex;flex-direction:column;gap:4px}
        .combo-item{font-size:12px;color:var(--text2);padding:4px 8px;background:var(--bg2);border-radius:5px;border-left:2px solid var(--blue-mid)}
        .info-grid{display:grid;grid-template-columns:80px 1fr;gap:4px 12px}
        .info-label{font-size:11px;font-weight:500;color:var(--text2);padding-top:2px}
        .info-val{font-size:12px;color:var(--text)}
        .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:3px}
        .tag-new{background:var(--purple-light);color:var(--purple)}
        .tag-renamed{background:var(--amber-light);color:var(--amber)}
        .tag-merged{background:var(--teal-light);color:var(--teal)}

        /* Tool card */
        .tool-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
        .tool-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .1s}
        .tool-header:hover{background:var(--bg2)}
        .tool-id{font-size:10px;font-weight:700;width:30px;text-align:center;padding:2px 4px;border-radius:4px;flex-shrink:0}
        .tool-name{font-size:13px;font-weight:500;flex:1}
        .tool-license{font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0}
        .tool-replace{font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0}
        .tool-toggle{font-size:12px;color:var(--text2);transition:transform .2s;flex-shrink:0}
        .tool-card.open .tool-toggle{transform:rotate(90deg)}
        .tool-body{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
        .tool-card.open .tool-body{display:block}
        .tool-desc{font-size:12px;color:var(--text2);line-height:1.55;padding:10px 0 6px}

        /* IO table */
        .io-table{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}
        .io-table th{padding:5px 8px;text-align:left;background:var(--bg2);font-weight:500;color:var(--text2);border-bottom:1px solid var(--border)}
        .io-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
        .io-table tr:last-child td{border-bottom:none}
        .io-dir-in{background:#EBF5FF;color:#0C447C;font-weight:500;padding:1px 5px;border-radius:3px}
        .io-dir-out{background:#EAF3DE;color:#27500A;font-weight:500;padding:1px 5px;border-radius:3px}
        .io-param{font-family:monospace;color:var(--teal)}
        .io-type{color:var(--text2);font-style:italic}

        /* Install blocks */
        .install-block{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:6px 0}
        .install-row{display:flex;align-items:flex-start;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border)}
        .install-row:last-child{border-bottom:none}
        .install-key{font-size:10px;font-weight:600;color:var(--text2);width:55px;flex-shrink:0;padding-top:2px;text-transform:uppercase}
        .install-val{font-size:11px;font-family:monospace;color:var(--blue);word-break:break-all;flex:1;white-space:pre-wrap}

        /* Info rows */
        .info-rows{display:flex;flex-direction:column;gap:0}
        .info-row{display:flex;gap:0;border-bottom:1px solid var(--border);font-size:12px}
        .info-row:last-child{border-bottom:none}
        .info-k{width:80px;flex-shrink:0;padding:6px 8px;font-weight:500;color:var(--text2);background:var(--bg2);font-size:11px}
        .info-v{padding:6px 10px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word}

        /* Search highlight */
        .hl{background:#FFF176;border-radius:2px}

        /* Used-in chips */
        .used-in{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
        .used-chip{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--blue-light);color:var(--blue)}

        /* Template view */
        .tmpl-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
        .tmpl-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer}
        .tmpl-header:hover{background:var(--bg2)}
        .tmpl-body{display:none;border-top:1px solid var(--border)}
        .tmpl-card.open .tmpl-body{display:block}
        .tmpl-card.open .tool-toggle{transform:rotate(90deg)}
        .json-block{background:#1e1e1e;color:#d4d4d4;font-family:monospace;font-size:11px;padding:12px 14px;line-height:1.6;overflow-x:auto;white-space:pre;border-radius:0 0 6px 6px}
        .json-key{color:#9cdcfe}
        .json-str{color:#ce9178}
        .json-num{color:#b5cea8}
        .json-bool{color:#569cd6}

        /* Responsibility list */
        .resp-list{list-style:none;display:flex;flex-direction:column;gap:4px;padding:10px 14px}
        .resp-list li{font-size:12px;color:var(--text2);padding-left:14px;position:relative;line-height:1.5}
        .resp-list li::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--blue-mid);position:absolute;left:2px;top:6px}

        /* Steps */
        .steps-list{display:flex;flex-direction:column;gap:0;padding:10px 14px}
        .step-row{display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border)}
        .step-row:last-child{border-bottom:none}
        .step-num{width:20px;height:20px;border-radius:50%;background:var(--blue-mid);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
        .step-content{flex:1}
        .step-title{font-size:12px;font-weight:500;color:var(--text)}
        .step-desc{font-size:11px;color:var(--text2);margin-top:1px}

        /* Format table */
        .fmt-table{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0}
        .fmt-table td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:top}
        .fmt-table tr:last-child td{border-bottom:none}
        .fmt-table td:first-child{font-weight:500;color:var(--text2);width:110px;white-space:nowrap}

        /* Scrollbar */
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        /* Empty state */
        .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}

        /* Responsive note for tools */
        .note-block{background:var(--amber-light);border-left:3px solid var(--amber);padding:8px 12px;border-radius:0 5px 5px 0;margin:6px 0;font-size:12px;color:var(--amber)}
        .change-block{background:var(--red-light);border-left:3px solid var(--red);padding:8px 12px;border-radius:0 5px 5px 0;margin:6px 0;font-size:12px;color:var(--red)}
    </style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">企业级通用工具类 Skills 完整文档，包含 Skills 清单、标准模板参考和工具详细清单三个部分。</h2>
<div class="app">

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>企业级通用工具类<br>Skills 完整文档</h1>
            <input class="search-box" type="text" id="searchInput" placeholder="搜索 Skill / 工具名称...">
        </div>
        <div class="sidebar-tabs">
            <button class="stab active" onclick="switchTab('catalog',this)">清单</button>
            <button class="stab" onclick="switchTab('template',this)">模板</button>
            <button class="stab" onclick="switchTab('tools',this)">工具</button>
        </div>
        <nav class="nav-list" id="navList"></nav>
    </div>

    <div class="main">
        <div class="top-tabs">
            <button class="ttab active" onclick="switchMainTab('catalog',this)">
                Skills 清单 <span class="tab-count">29</span>
            </button>
            <button class="ttab" onclick="switchMainTab('template',this)">
                标准模板参考 <span class="tab-count">26</span>
            </button>
            <button class="ttab" onclick="switchMainTab('tools',this)">
                工具详细清单 <span class="tab-count">62</span>
            </button>
        </div>

        <div class="content">

            <!-- TAB 1: Skills 清单 -->
            <div class="tab-panel active" id="panel-catalog">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-num">29</div><div class="stat-label">Skills 总数</div></div>
                    <div class="stat-card"><div class="stat-num">8</div><div class="stat-label">功能分类</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--purple)">9</div><div class="stat-label">v3 新增 Skill</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--green)">61</div><div class="stat-label">涉及工具总数</div></div>
                </div>
                <div id="catalogContent"></div>
            </div>

            <!-- TAB 2: 标准模板 -->
            <div class="tab-panel" id="panel-template">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-num">26</div><div class="stat-label">完整模板</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--teal)">8</div><div class="stat-label">标准字段</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">26</div><div class="stat-label">示例 JSON</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--green)">100%</div><div class="stat-label">许可证合规</div></div>
                </div>
                <div id="templateContent"></div>
            </div>

            <!-- TAB 3: 工具清单 -->
            <div class="tab-panel" id="panel-tools">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-num">62</div><div class="stat-label">工具总数</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--red)">12</div><div class="stat-label">已替换/弃用</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--green)">100%</div><div class="stat-label">开源可用</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--teal)">9</div><div class="stat-label">工具分组</div></div>
                </div>
                <div id="toolsContent"></div>
            </div>

        </div>
    </div>
</div>

le:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">数据概览（行数、字段信息）</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">错误详情列表</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div></div><div class=\"cat-header\" style=\"background:#E2EFDA;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin:20px 0 10px;cursor:pointer;user-select:none\" onclick=\"this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')\">\n    <span style=\"width:10px;height:10px;border-radius:50%;background:#3A8C35;display:inline-block;flex-shrink:0\"></span>\n    <h2 style=\"font-size:14px;font-weight:600;color:#375623;flex:1;margin:0\">二、文档与内容类</h2>\n    <span style=\"font-size:11px;color:#375623;opacity:.7\">4 个 Skill</span>\n    <span class=\"cat-toggle\" style=\"color:#375623;font-size:12px\">▼</span>\n  </div>\n  <div class=\"cat-body\"><div class=\"tmpl-card\" id=\"tmpl-6\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#3A8C35;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">6</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500 ustify-content:center;flex-shrink:0;margin-top:1px\">13</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">深度搜索智能助手</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">DeepSearchSkill</div>\n        <div style=\"font-size:12px;color:#666;margin-top:3px;line-height:1.5\">私有化环境下对内网多数据源（文件服务器、数据库、知识库、爬虫数据）执行深度检索，汇总多源结果，自动去重排序并生成带引用溯源的结构化答案，适配企业内部信息检索和知识发现场景。</div>\n      </div>\n      <div class=\"tool-toggle\" style=\"color:#999;flex-shrink:0;transition:transform .2s;margin-top:2px;font-size:14px\">›</div>\n    </div>\n    <div class=\"tmpl-body\" style=\"border-top:1px solid #e2e2e2;padding:14px\">\n      <div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">基础信息</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">功能定位</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">企业级多源深度检索工具，Elasticsearch/OpenSearch 全文检索 + 向量语义检索双引擎，结果汇总与引用溯源，离线部署。</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">适用场景</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">跨内网系统信息检索、多文档联合搜索、知识库深度挖掘、内网百科式问题解答、竞品/行业信息聚合检索</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align :1.5\">记录检索过程、覆盖数据源、结果数量</div>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">在内网多数据源中检索&quot;2026年Q1销售目标执行情况&quot;，汇总相关文档和数据，生成带溯源的分析报告。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;deep_search&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;query&quot;</span>: <span style=\"color:#ce9178\">&quot;2026年Q1销售目标执行情况&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;search_scope&quot;</span>: {\n    <span style=\"color:#9cdcfe\">&quot;sources&quot;</span>: [&quot;file_server&quot;, &quot;database&quot;, &quot;knowledge_base&quot;],\n    <span style=\"color:#9cdcfe\">&quot;time_range&quot;</span>: <span style=\"color:#ce9178\">&quot;2026-01-01/2026-03-31&quot;</span>\n  },\n  <span style=\"color:#9cdcfe\">&quot;top_k&quot;</span>: <span style=\"color:#b5cea8\">10</span>,\n  <span style=\"color:#9cdcfe\">&quot;need_summary&quot;</span>: <span style=\"color:#569cd6\">true</span>,\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:DeepSearch]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"widt -top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">将 5 份企业制度文档入库，然后查询&quot;员工年假申请流程&quot;，返回答案和溯源。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;knowledge_qa&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;operation&quot;</span>: <span style=\"color:#ce9178\">&quot;query&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;question&quot;</span>: <span style=\"color:#ce9178\">&quot;员工年假申请流程是什么？&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;kb_name&quot;</span>: <span style=\"color:#ce9178\">&quot;企业制度知识库&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;top_k&quot;</span>: <span style=\"color:#b5cea8\">3</span>,\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:KnowledgeQA]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">qa_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">answer</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">生成的答案</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">sources</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">溯源列表（文档名/段落/相关度）</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">错误详情</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div><div class=\"tmpl-card\" id=\"tmpl-15\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-item owledgeQASkill）</span>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7F5A00;border-bottom:2px solid #7F5A00;padding-bottom:3px;margin-bottom:8px\">主线步骤</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">1</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">文档入图</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">LLM + spaCy 提取实体和关系，写入 Neo4j</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">2</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">索引构建</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">同步向量索引，供混合检索</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">3</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">接收查询</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2 -size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">7</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">结果输出</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">返回答案、推理路径和关系图</div>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">基于企业供应商文档构建知识图谱，查询&quot;哪些供应商同时为A产品线和B产品线供货&quot;。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;rag_graph&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;operation&quot;</span>: <span style=\"color:#ce9178\">&quot;query&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;question&quot;</span>: <span style=\"color:#ce9178\">&quot;哪些供应商同时为A产品线和B产品线供货？&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;kb_name&quot;</span>: <span style=\"color:#ce9178\">&quot;供应商知识图谱&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;max_hops&quot;</span>: <span style=\"color:#b5cea8\">3</span>,\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:RAGGraph]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">qa_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">answer</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">多跳推理生成的答案</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">reasoning_path</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">推理路径（实体-关系-实体链）</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">graph_data</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">相关实体关系图数据（用于可视化）</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">错误详情</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div></div><div class=\"cat-header\" style=\"background:#FFF2CC;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin:20px 0 10px;cursor:pointer;user-select:none\" onclick=\"this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')\">\n    <span style=\"width:10px;height:10px;border-radius:50%;background:#B07800;display:inline-block;flex-shrink:0\"></span>\n    <h2 style=\"font-size:14px;font-weight:600;color:#7F5A00;flex:1;margin:0\">四、流程与自动化类</h2>\n    <span style=\"font-size:11px;color:#7F5A00;opacity:.7\">3 个 Skill</span>\n    <span class=\"cat-toggle\" style=\"color:#7F5A00;font-size:12px\">▼</span>\n  </div>\n  <div class=\"cat-body\"><div class=\"tmpl-card\" id=\"tmpl-16\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#B07800;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">16</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">定时任务与调度 Skill</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">ScheduleSkill</div>\n        <div style=\"font-size:12px;color:#666;margin-top:3px;line-height:1.5\">私有化环境下对企业各类任务（数据采集、报告生成、邮件发送等）进行定时调度、执行监控和结果反馈，支持自定义调度规则、失败重试和任务依赖，适配企业自动化办公和批量任务管理。</div>\n      </div>\n      <div class=\"tool-toggle\" style=\"color:#999;flex-shrink:0;transition:transform .2s;margin-top:2px;font-size:14px\">›</div>\n    </div>\n    <div class=\"tmpl-body\" style=\"border-top:1px solid #e2e2e2;padding:14px\">\n      <div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">基础信息</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">功能定位</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">企业级定时任务调度，Celery + APScheduler 双引擎 + Valkey 任务队列，支持任务依赖和失败重试，复用 Skill 19 监控底座，离线部署。</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">适用场景</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">定时数据采集、定时报告生成、定时邮件发送、定时数据库备份、前文全部 Skill 的定时调度</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">许可证</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;bor nt-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">6.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持任务暂停、恢复、删除，灵活管理任务列表</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">7.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">记录调度日志，支持溯源和任务优化</span>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">支持格式</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\"><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输入</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">任务类型（所有前文 Skill）、调度规则、执行参数、重试规则、任务依赖</td>\n  </tr><tr style=\"background:#f8f8f8\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">输出</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">任务执行结果、调度日志、重试记录、调度报告</td>\n  </tr><tr style=\"background:#fff\">\n    <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap;width:100px\">支持任务类型</td>\n    <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">前文 Skill 1–16 全部任务类型，以及自定义 Python 函数</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spaci l&quot;</span>: <span style=\"color:#569cd6\">true</span>, <span style=\"color:#9cdcfe\">&quot;send_frequency&quot;</span>: <span style=\"color:#ce9178\">&quot;weekly&quot;</span>},\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:TaskSchedule]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">schedule_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | partial | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">task_results</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">各任务执行结果</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">retry_log</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">object</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">重试次数和失败任务列表</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">schedule_report</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">调度报告文件 URL</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div><div class=\"tmpl-card\" id=\"tmpl-17\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#B07800;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">17</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">工作流编排 Skill</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">WorkflowSkill</div>\n        <div style=\"font-size:12px;color:#666;margin-top:3px;line-height:1.5\">私有化环境下对多个 Skill 进行可视化编排，支持顺序执行、条件分支、并行任务和结果聚合，适配企业复杂自动化流程场景，无需编写代码即可组合 Skill 构建工作流。</div>\n      </div>\n      <div class=\"tool-toggle\" style=\"color:#999;flex-shrink:0;transition:transform .2s;margin-top:2px;font-size:14px\">›</div>\n    </div>\n    <div class=\"tmpl-body\" style=\"border-top:1px solid #e2e2e2;padding:14px\">\n      <div style=\"margin-top:14px\">\n    <div style=\"font-si 需云端服务，完全内网运行</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">Valkey 复用</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">复用已有 Valkey 实例，无需重复部署</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">职责范围</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">接收工作流定义（JSON 描述语言），解析 DAG 结构</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">按 DAG 顺序调度各节点 Skill 执行，传递节点间数据</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持条件分支（if/else），根据上游 Skill 输出决定执行路径</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">支持 ttom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">Valkey 复用</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">与 Skill 22 共用同一 Valkey 实例，不额外占用资源；使用不同 DB 编号隔离数据</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">SMTP 配置</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">对接企业内网邮件服务器（Exchange/Postfix），内网直连，无外网依赖</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">职责范围</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">1.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">接收推送请求，校验消息内容合规性（长度、敏感词过滤），获取接收人信息</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">对接企业微信，验证 Webhook 或应用消息 Token 有效性</span>\n    </div>\n    <div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5\">\n      <span style=\"font-size:11px;font-weight:700;color:#2E75B6;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <span style=\"font-size:12px;color:#595959;line-height:1.55\">通过 ai ne-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">企业微信 Webhook 失效</span><span style=\"color:#595959\">：自动降级至邮件渠道推送，同时告警通知管理员检查 Webhook 配置</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">2.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">批量推送部分失败</span><span style=\"color:#595959\">：成功/失败分别记录，失败接收人进入重试队列，最多重试 3 次后标记失败</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">3.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">定时任务漏触发</span><span style=\"color:#595959\">：APScheduler 检测到漏执行则补偿触发，记录漏触发事件</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">4.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">接收人不存在</span><span style=\"color:#595959\">：从企业通讯录校验，不存在的接收人从列表移除并记录，不中断整体推送</span>\n      </div>\n    </div><div style=\"display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <span style=\"font-size:11px;font-weight:700;color:#C03030;width:18px;flex-shrink:0;padding-top:1px\">5.</span>\n      <div style=\"flex:1;font-size:12px;line-height:1.55\">\n        <span style=\"color:#1a1a1a;font-weight:500\">SMTP 连接超时</span><span style=\"color:#595959\">：自动重连 3 次，超限后切换备用 SMTP 服务器（若配置）</span>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7F5A00;border-bottom:2px solid #7F5A00;padding-bottom:3px;margin-bottom:8px\">主线步骤</div>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">1</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">接收请求</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">获取消息内容、推送渠道、接收人、推送类型、时间配置</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">2</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">内容校验</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">检查消息长度、敏感词，验证接收人列表有效性</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">3</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">写入队列</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">将推送任务序列化后写入 Valkey ;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">7</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">结果汇总</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">任务完成后汇总成功/失败数量，生成推送日志</div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#2E75B6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">8</div>\n      <div style=\"flex:1\">\n        <div style=\"font-size:12px;font-weight:500;color:#1F4E79\">日志持久化</div>\n        <div style=\"font-size:12px;color:#595959;margin-top:2px;line-height:1.5\">推送记录写入日志文件，支持按时间/渠道/接收人查询</div>\n      </div>\n    </div></div>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4A3E99;border-bottom:2px solid #4A3E99;padding-bottom:3px;margin-bottom:8px\">示例调用</div>\n    <div style=\"font-size:12px;color:#595959;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:5px;border-left:3px solid #2E75B6\">向销售部门全员推送&quot;今日 18:00 前提交销售日报&quot;提醒，通过企业微信和内网邮件双渠道立即推送。</div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">参数 JSON</div>\n    <div style=\"background:#1e1e1e;border-radius:6px;padding:12px 14px;margin-bottom:10px;overflow-x:auto\"><pre style=\"margin:0;font-family:'Courier New',monospace;font-size:11px;color:#d4d4d4;line-height:1.6;white-space:pre\">{\n  <span style=\"color:#9cdcfe\">&quot;task&quot;</span>: <span style=\"color:#ce9178\">&quot;message_push&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;message&quot;</span>: <span style=\"color:#ce9178\">&quot;今日18: <span style=\"color:#b5cea8\">00</span>前提交销售日报&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;template&quot;</span>: <span style=\"color:#ce9178\">&quot;task_reminder&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;channels&quot;</span>: [&quot;wechat_work&quot;, &quot;internal_email&quot;],\n  <span style=\"color:#9cdcfe\">&quot;recipients&quot;</span>: {<span style=\"color:#9cdcfe\">&quot;department&quot;</span>: <span style=\"color:#ce9178\">&quot;销售部&quot;</span>},\n  <span style=\"color:#9cdcfe\">&quot;push_type&quot;</span>: <span style=\"color:#ce9178\">&quot;immediate&quot;</span>,\n  <span style=\"color:#9cdcfe\">&quot;tool&quot;</span>: <span style=\"color:#ce9178\">&quot;@[tool:MessagePush]&quot;</span>\n}</pre></div>\n    <div style=\"font-size:11px;font-weight:600;color:#595959;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em\">返回结果字段</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr style=\"background:#f5f5f5\"><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">字段</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">类型</th><th style=\"padding:4px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n      <tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">push_status</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">success | partial | failed</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">success_count</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">integer</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">成功推送人数</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">fail_records</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">失败接收人及原因，含 retry 字段</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">push_log</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">string</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">推送日志文件 URL</td>\n  </tr><tr>\n    <td style=\"font-family:monospace;font-size:11px;color:#0F6E56;padding:4px 8px;border-bottom:1px solid #eee\">errors</td>\n    <td style=\"font-size:11px;color:#7F6000;padding:4px 8px;border-bottom:1px solid #eee;font-style:italic\">array</td>\n    <td style=\"font-size:12px;color:#595959;padding:4px 8px;border-bottom:1px solid #eee;line-height:1.4\">系统级错误（渠道不可用等）</td>\n  </tr>\n    </table>\n  </div>\n    </div>\n  </div><div class=\"tmpl-card\" id=\"tmpl-20\" style=\"background:#fff;border:1px solid #e2e2e2;border-radius:8px;margin-bottom:10px;overflow:hidden\">\n    <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .1s\" onclick=\"toggleCard(this.parentElement)\" onmouseover=\"this.style.background='#f8f8f8'\" onmouseout=\"this.style.background=''\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#C43D7A;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">20</div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:500;color:#1a1a1a\">邮件自动化处理 Skill</div>\n        <div style=\"font-size:11px;color:#2E75B6;font-family:monospace;margin-top:2px\">EmailAutoSkill</div>\n        <div style=\"font-size:12px;color:#666;margin-top:3px;line-height:1.5\">私有化环境下对接企业内网邮箱，实现邮件自动接收、解析、分类、回复和归档，支持附件提取、邮件筛选和定时发送，适配企业邮件自动化办公和批量处理场景。</div>\n      </div>\n      <div class=\"tool-toggle\" style=\"color:#999;flex-shrink:0;transition:transform .2s;margin-top:2px;font-size:14px\">›</div>\n    </div>\n    <div class=\"tmpl-body\" style=\"border-top:1px solid #e2e2e2;padding:14px\">\n      <div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">基础信息</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">功能定位</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">企业级邮件自动化，imaplib/aiosmtplib + Valkey 队列，内网邮箱对接，批量发送可靠投递，离线部署。注意：原模板邮件发送使用 smtplib（同步阻塞），已升级为 aiosmtplib（异步）。</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">适用场景</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">邮件自动回复、批量邮件发送、附件自动提取归档、邮件分类整理、定时邮件通知</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">许可证</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">imaplib/email: Python 标准库（PSF）| aiosmtplib: MIT | Valkey: BSD 3-Clause | Pandas: BSD 3-Clause</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">私有化合规</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">完全合规。Python 标准库 PSF，aiosmtplib MIT，Valkey BSD 3-Clause，无任何限制。</td>\n      </tr>\n    </table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">工具栈（国内可用 · 已验证）</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n    <tr style=\"background:#f5f5f5\"><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">工具</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">许可证</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">私有化可用性</th><th style=\"padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:#595959;border-bottom:1px solid #e2e2e2\">说明</th></tr>\n    <tr>\n      <td style=\"font-size:12px;font-weight:500;color:#1F4E79;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap\">imaplib + email</td>\n      <td style=\"padding:5px 8px;border-bottom:1px solid #eee\"><span style=\"font-size:10px;padding:1px 5px;border-radius:3px;background:#E2EFDA;color:#375623\">PSF（标准库）</span>< ble style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\">\n      <tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">功能定位</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">企业级数据脱敏工具，PaddleNLP NER + 规则引擎双驱动，支持多种脱敏策略（掩码/替换/哈希/删除），离线部署，数据不出内网。</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">适用场景</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">数据库导出数据脱敏、文档中 PII 信息打码、日志敏感信息过滤、测试数据生成脱敏、跨部门数据共享前处理</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">许可证</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">PaddleNLP: Apache 2.0 | Pandas: BSD 3-Clause | Python 标准库: PSF</td>\n      </tr><tr>\n        <td style=\"font-size:11px;font-weight:500;color:#595959;padding:5px 8px;background:#f5f5f5;border-bottom:1px solid #eee;width:80px;vertical-align:top;white-space:nowrap\">私有化合规</td>\n        <td style=\"font-size:12px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5\">完全合规。全部工具为 Apache 2.0/BSD/PSF 宽松许可，无限制。</td>\n      </tr>\n    </table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px solid #2E75B6;padding-bottom:3px;margin-bottom:8px\">工具栈（国内可用 · 已验证）</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6p #375623\">✓ 完全可用</span></td>\n      <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #eee;line-height:1.4\">Webhook 接收端和 API 代理服务</td>\n    </tr>\n  </table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0A5E48;border-bottom:2px solid #0A5E48;padding-bottom:3px;margin-bottom:8px\">国内部署说明</div>\n    <table style=\"width:100%;border-collapse:collapse;border:1px solid #e2e2e2;border-radius:6px;overflow:hidden\"><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">pip 安装</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">pip install httpx pydantic fastapi -i https://pypi.tuna.tsinghua.edu.cn/simple</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">内网 API</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">内网 API 直连无障碍，支持自定义证书（内网 HTTPS）</td>\n  </tr><tr>\n    <td style=\"font-size:11px;font-weight:500;color:#0A5E48;padding:5px 8px;background:#E1F5EE;border-bottom:1px solid #e2e2e2;white-space:nowrap;width:130px;vertical-align:top\">离线运行</td>\n    <td style=\"font-size:11px;color:#595959;padding:5px 8px;border-bottom:1px solid #e2e2e2;font-family:monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6\">全部本地运行，无外网依赖</td>\n  </tr></table>\n  </div><div style=\"margin-top:14px\">\n    <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2E75B6;border-bottom:2px
