[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
loglevel=info

[program:main_api]
command=python main.py
directory=/app/backend/main_api
autostart=true
autorestart=true
stderr_logfile=/app/logs/main_api.err.log
stdout_logfile=/app/logs/main_api.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin"
priority=1

[program:outline]
command=python main_api.py
directory=/app/backend/simpleOutline
autostart=true
autorestart=true
stderr_logfile=/app/logs/outline.err.log
stdout_logfile=/app/logs/outline.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin"
priority=2

[program:content]
command=python main_api.py
directory=/app/backend/slide_agent
autostart=true
autorestart=true
stderr_logfile=/app/logs/content.err.log
stdout_logfile=/app/logs/content.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin"
priority=3

[program:wenshu_api]
command=python wenshu_api.py
directory=/app/backend/slide_agent
autostart=true
autorestart=true
stderr_logfile=/app/logs/wenshu_api.err.log
stdout_logfile=/app/logs/wenshu_api.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin",WENSHU_API_PORT="8001"
priority=4

[program:personaldb]
command=python main.py
directory=/app/backend/personaldb
autostart=true
autorestart=true
stderr_logfile=/app/logs/personaldb.err.log
stdout_logfile=/app/logs/personaldb.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin"
priority=5

[program:frontend]
command=npm run dev -- --host 0.0.0.0 --port 80
directory=/app/frontend
autostart=true
autorestart=true
stderr_logfile=/app/logs/frontend.err.log
stdout_logfile=/app/logs/frontend.out.log
environment=PATH="/usr/local/bin:/usr/bin:/bin",NODE_ENV="development"
priority=6
user=root

[group:backend]
programs=main_api,outline,content,wenshu_api,personaldb

[group:all]
programs=main_api,outline,content,wenshu_api,personaldb,frontend
