    - data:
        code: "import json\nimport re\nfrom datetime import datetime\nfrom typing import List, Dict, Any\n\ndef main(structured_output: Any) -> Dict[str, str]:\n    default_result: Dict[str, str] = {\n        \"chart_type\": \"\",\n        \"title\": \"\",\n        \"x_axis\": \"\",\n        \"data\": \"\",\n        \"categories\": \"\"\n    }\n    \n    try:\n        if isinstance(structured_output, dict):\n            data = structured_output\n        elif isinstance(structured_output, str):\n            if not structured_output.strip():\n                default_result[\"title\"] = \"输入数据为空\"\n                return default_result\n            data = json.loads(structured_output)\n        else:\n            default_result[\"title\"] = f\"不支持的输入类型: {type(structured_output).__name__}\"\n            return default_result\n        \n        chart_type = data.get(\"chart_type\", \"\")\n        echarts_data = data.get(\"echarts_data\", {})\n        title = echarts_data.get(\"title\", \"\")\n        x_axis = echarts_data.get(\"x_axis\", [])\n        data_values = echarts_data.get(\"data\", [])\n        \n        def sort_and_convert_time_axis(axis_list: List[str], data_list: List[Any]) -> tuple[List[str], List[Any]]:\n            time_patterns = [\n                (r'(\\d{4})年(\\d{1,2})月', '%Y年%m月'),\n                (r'(\\d{1,2})月(\\d{1,2})日', '%m月%d日'),\n                (r'(\\d{1,2})月', '%m月'),\n                (r'(\\d{4})-(\\d{1,2})-(\\d{1,2})', '%Y-%m-%d'),\n                (r'(\\d{4})/(\\d{1,2})/(\\d{1,2})', '%Y/%m/%d'),\n                (r'(\\d{1,2})时', '%H时'),\n            ]\n            \n            time_items = []\n            non_time_items = []\n            \n            for idx, item in enumerate(axis_list):\n                item_str = str(item).strip()\n                data_val = data_list[idx] if idx < len(data_list) else 0\n                matched = False\n                \n                if item_str.isdigit():\n                    try:\n                        ts = int(item_str)\n                        if len(item_str) == 13:\n                            ts = ts // 1000\n                        dt = datetime.fromtimestamp(ts)\n                        if dt.minute == 0 and dt.second == 0:\n                            display_text = dt.strftime(\"%Y年%m月%d日\")\n                        else:\n                            display_text = dt.strftime(\"%Y年%m月%d日 %H:%M:%S\")\n                        time_items.append((dt, display_text, data_val))\n                        matched = True\n                        continue\n                    except:\n                        pass\n                \n                for pattern, fmt in time_patterns:\n                    match = re.match(pattern, item_str)\n                    if match:\n                        try:\n                            if fmt in ['%m月', '%m月%d日']:\n                                full_time_str = f\"2024年{item_str}\"\n                                dt = datetime.strptime(full_time_str, f'%Y年{fmt}')\n                                display_text = full_time_str\n                            else:\n                                dt = datetime.strptime(item_str, fmt)\n                                display_text = item_str\n                            time_items.append((dt, display_text, data_val))\n                            matched = True\n                            break\n                        except:\n                            continue\n                \n                if not matched:\n                    non_time_items.append((item_str, data_val))\n            \n            sorted_time_items = sorted(time_items, key=lambda x: x[0])\n            sorted_x = [item[1] for item in sorted_time_items]\n            sorted_data = [item[2] for item in sorted_time_items]\n            \n            non_time_x = [item[0] for item in non_time_items]\n            non_time_data = [item[1] for item in non_time_items]\n            \n            final_x = sorted_x + non_time_x\n            final_data = sorted_data + non_time_data\n            \n            return final_x, final_data\n        \n        sorted_x_axis, sorted_data = sort_and_convert_time_axis(x_axis, data_values)\n        \n        x_axis_str = \";\".join(sorted_x_axis)\n        data_str = \";\".join(map(str, sorted_data))\n        \n        result = {\n            \"chart_type\": chart_type,\n            \"title\": title,\n            \"x_axis\": x_axis_str,\n            \"data\": data_str,\n            \"categories\": x_axis_str\n        }\n        \n        return result\n        \n    except Exception as e:\n        default_result[\"title\"] = f\"数据处理异常: {str(e)[:50]}\"\n        return default_result"
