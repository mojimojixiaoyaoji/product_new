    - data:
        code: "\nimport json\nfrom datetime import datetime, timezone, timedelta\n\ndef main(data_query_result: str):\n    def convert_timestamp(timestamp_ms):\n        try:\n            ts = float(timestamp_ms)\n            dt_utc = datetime.fromtimestamp(ts / 1000, tz=timezone.utc)\n            dt_cst = dt_utc.astimezone(timezone(timedelta(hours=8)))\n            return dt_cst.strftime(\"%Y-%m-%d %H:%M:%S\")\n        except Exception:\n            return str(timestamp_ms)\n    \n    result = {\n        \"success\": False, \n        \"error\": \"输入为空\", \n        \"data\": {}\n    }\n\n    try:\n        if data_query_result is None:\n            pass\n        elif isinstance(data_query_result, str):\n            if not data_query_result.strip():\n                result[\"error\"] = \"输入字符串为空\"\n            else:\n                try:\n                    raw_data = json.loads(data_query_result)\n                    result = raw_data.copy() if isinstance(raw_data, dict) else {}\n                except json.JSONDecodeError:\n                    result[\"error\"] = \"JSON解析失败\"\n        elif isinstance(data_query_result, dict):\n            result = data_query_result.copy()\n        else:\n            result[\"error\"] = f\"类型错误: {type(data_query_result).__name__}\"\n        \n        if isinstance(result, dict) and result.get(\"success\") and result.get(\"data\"):\n            data = result[\"data\"]\n            if \"状态记录时间\" in data and isinstance(data[\"状态记录时间\"], list):\n                data[\"状态记录时间\"] = [convert_timestamp(ts) for ts in data[\"状态记录时间\"]]\n            elif \"time\" in data and isinstance(data[\"time\"], list):\n                data[\"time\"] = [convert_timestamp(ts) for ts in data[\"time\"]]\n        \n        processed_data = json.dumps(result, ensure_ascii=False)\n        return {\n            \"processed_data\": processed_data\n        }\n\n    except Exception as e:\n        error_result = {\n            \"success\": False, \n            \"error\": str(e), \n            \"data\": {}\n        }\n        return {\n            \"processed_data\": json.dumps(error_result, ensure_ascii=False)\n        }"
