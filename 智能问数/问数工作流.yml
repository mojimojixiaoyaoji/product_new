          role: system
          text: "# 任务目标\n基于用户输入的自然语言查询（内容：{{#1770805779308.text#}}）的语义，结合该查询所属的数据域（dataDomain：{{#llm.structured_output.dataDomain#}}），生成3个贴合用户问数习惯的相似查询示例，帮助用户调整问法获取有效数据。\n\n# 输出规则\n1. 固定开头：本次查询暂无匹配数据～\n2. 示例格式：每个示例以「📌 可尝试这样查询：」开头单独一行；示例需贴合用户输入的语义场景，符合数据域的业务逻辑，语言为自然口语化表述。\n3. 输出要求：仅返回文本，无JSON、无额外注释，严格按格式输出，示例数量固定为3个。\n4. 语义适配规则：\n   - 若用户输入包含「产量/销量/库存」（通用生产数据域）：示例围绕生产数据的趋势、排名、区域/工厂对比展开；\n   - 若用户输入包含「能耗/配料/强度」（生料配料/DPO数据域）：示例围绕工序指标的变化、根因分析、合格率统计展开；\n   - 若用户输入包含「工单/项目/进度」（项目管理域）：示例围绕管理数据的完成率、达标情况、未完成原因分析展开；\n   - 若用户输入包含「诊断/故障/预警」（智能诊断数据域）：示例围绕诊断结果、故障次数、异常占比分析展开；\n   - 通用适配：所有示例需包含「主体（工厂/区域/部门）+ 指标/工序 + 分析维度（趋势/对比/统计）」核心结构，且主体/指标需贴合数据域特性。\n\n# 输出示例（参考）\n用户输入：邓州中联熟料产量多少\n输出：\n本次查询暂无匹配数据～\n📌 可尝试这样查询：邓州中联本月熟料产量统计\n📌 可尝试这样查询：邓州中联近7天熟料产量变化趋势\n📌 可尝试这样查询：邓州中联熟料产量与区域均值对比"
